<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Financeiro Pro v29.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #f3f8ff; --bg-bottom: #fcfdff;
            --panel: #ffffff; --line: #dde8f5;
            --text: #18324a; --blue: #ff7a00; /* Laranja Inter */
            --inter: #ff7a00; --dinheiro: #18b778;
            --shadow: 0 14px 36px rgba(56, 96, 150, .08);
        }

        * { box-sizing: border-box; outline: none !important; }
        body {
            background: radial-gradient(circle at top left, rgba(255,122,0,.08), transparent 28%),
                        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .shell-card { background: rgba(255,255,255,.84); backdrop-filter: blur(12px); border: 1px solid rgba(221,232,245,.8); border-radius: 32px; box-shadow: var(--shadow); }
        .panel { background: #fff; border: 1px solid var(--line); border-radius: 24px; box-shadow: 0 4px 12px rgba(56,96,150,.05); }
        
        .metric-card { position: relative; overflow: hidden; min-height: 135px; transition: all 0.3s ease; }
        .metric-card::after { content: ""; position: absolute; right: -20px; bottom: -20px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.1); }
        .hero-main { background: linear-gradient(135deg, #ff9500 0%, #ff7a00 100%); color: white; border: none; }

        .metric-number { font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: -0.04em; }
        .eyebrow { font-size: 9px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: #7c93ac; }

        .btn-premium { display: inline-flex; align-items: center; justify-content: center; gap: 0.6rem; border-radius: 16px; padding: 0.8rem 1.2rem; font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.2s; cursor: pointer; border: 1px solid transparent; }
        .btn-premium:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-premium:active { transform: translateY(0); }

        .premium-input, .premium-select { width: 100%; border-radius: 16px; border: 1px solid var(--line); background: #fff; padding: 0.9rem 1.1rem; transition: all 0.2s; color: var(--text); font-weight: 600; font-size: 14px; }
        .premium-input:focus { border-color: var(--inter); box-shadow: 0 0 0 4px rgba(255,122,0,0.1); }

        .entry-row { transition: all 0.2s; border: 1px solid #edf3fa; background: #fff; }
        .entry-row:hover { transform: translateX(5px); border-color: var(--inter); background: #fffbf5; }

        .collapse-panel { display: grid; grid-template-rows: 0fr; opacity: 0; transition: all 0.35s ease; overflow: hidden; }
        .collapse-panel.open { grid-template-rows: 1fr; opacity: 1; }

        body.ultra-focus #filterSection, body.ultra-focus #btnRelatorio, body.ultra-focus .history-block { display: none !important; }
        body.ultra-focus #mainContent { grid-template-columns: 1fr 1.6fr !important; }
        
        .status-sync { display: inline-flex; align-items: center; gap: 6px; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .loading-dot { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media (max-width: 1024px) { #mainContent { grid-template-columns: 1fr !important; } }
    </style>
</head>
<body class="p-3 md:p-6">

<div id="appContainer" class="max-w-[1640px] mx-auto flex flex-col gap-5">
    
    <div class="shell-card p-5 md:p-8">
        
        <!-- HEADER -->
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-8">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 rounded-3xl bg-white flex items-center justify-center border border-slate-200 shadow-sm">
                    <i data-lucide="orange" class="w-8 h-8 text-[#ff7a00]"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight uppercase">Financeiro<span class="text-[#ff7a00]">Pro</span> <span class="text-slate-300 text-xl font-medium">v29.0</span></h1>
                    <div id="statusSync" class="status-sync text-emerald-500 mt-1">
                        <div class="w-2 h-2 rounded-full bg-emerald-500"></div> Sincronizado
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 bg-slate-100/50 p-2.5 rounded-2xl border border-slate-200">
                <i data-lucide="calendar" class="w-4 h-4 text-slate-400 ml-2"></i>
                <select id="f_mes" class="bg-transparent font-bold text-sm px-2 outline-none cursor-pointer text-slate-700"></select>
                <select id="f_ano" class="bg-[#ff7a00] text-white font-bold text-sm px-4 py-2 rounded-xl outline-none cursor-pointer shadow-md shadow-orange-100"></select>
            </div>
        </header>

        <!-- DASHBOARD METRICS -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
            <div class="panel hero-main metric-card p-6 md:col-span-2 lg:col-span-1">
                <span class="eyebrow text-orange-50">Previsão Final</span>
                <div id="totalSaldo" class="metric-number text-4xl mt-3">R$ 0,00</div>
                <p class="text-[10px] text-orange-50/80 mt-5 uppercase font-extrabold tracking-wider">Balanço do mês selecionado</p>
            </div>

            <div class="panel p-6 metric-card">
                <span class="eyebrow">Dinheiro em Mão (Ok)</span>
                <div id="realMao" class="metric-number text-3xl text-slate-800 mt-3">R$ 0,00</div>
                <div class="flex gap-2 mt-5">
                    <span id="saldoCaixa" class="text-[9px] font-black bg-emerald-50 text-emerald-600 px-2.5 py-1.5 rounded-lg border border-emerald-100 uppercase">Dinheiro: R$ 0</span>
                    <span id="saldoBanco" class="text-[9px] font-black bg-orange-50 text-[#ff7a00] px-2.5 py-1.5 rounded-lg border border-orange-100 uppercase">Inter: R$ 0</span>
                </div>
            </div>

            <div class="panel p-6 metric-card border-l-4 border-l-emerald-500">
                <span class="eyebrow text-emerald-600">Total Recebido</span>
                <div id="totalR" class="metric-number text-3xl text-slate-800 mt-3">R$ 0,00</div>
                <i data-lucide="trending-up" class="absolute right-6 bottom-6 w-6 h-6 text-emerald-100"></i>
            </div>

            <div class="panel p-6 metric-card border-l-4 border-l-rose-500">
                <span class="eyebrow text-rose-600">Total Pago</span>
                <div id="totalP" class="metric-number text-3xl text-slate-800 mt-3">R$ 0,00</div>
                <i data-lucide="trending-down" class="absolute right-6 bottom-6 w-6 h-6 text-rose-100"></i>
            </div>
        </section>

        <!-- TOOLBAR -->
        <div class="flex flex-wrap gap-3 mb-8 no-print border-b border-slate-100 pb-6">
            <button id="btnRelatorio" class="btn-premium bg-slate-900 text-white">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Relatório
            </button>
            <button id="btnTransferencia" class="btn-premium bg-[#ff7a00] text-white">
                <i data-lucide="arrow-left-right" class="w-4 h-4"></i> Transferir (Inter/Dinheiro)
            </button>
            <button id="btnUltraFocus" class="btn-premium bg-white border-slate-200 text-slate-600">
                <i data-lucide="zap" class="w-4 h-4 text-orange-500"></i> Ultra Foco
            </button>
            <div class="flex-1"></div>
            <button id="btnExportJSON" class="btn-premium bg-slate-50 text-slate-500 border-slate-200">
                <i data-lucide="download" class="w-4 h-4"></i> Exportar Dados
            </button>
        </div>

        <main id="mainContent" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LATERAL: FORMULÁRIO -->
            <aside class="lg:col-span-4 xl:col-span-3 space-y-6 no-print">
                <div class="panel p-6 space-y-5 bg-slate-50/30">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-700">Novo Lançamento</h3>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Dia</label>
                            <input type="number" id="f_dia" min="1" max="31" class="premium-input text-center">
                        </div>
                        <div>
                            <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Parc.</label>
                            <input type="number" id="f_parc" min="1" value="1" class="premium-input text-center">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Descrição</label>
                        <input type="text" id="f_desc" class="premium-input uppercase" placeholder="EX: ALUGUEL, SALÁRIO...">
                    </div>

                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Onde movimentou?</label>
                        <select id="f_conta" class="premium-select">
                            <option value="banco">🏦 BANCO INTER</option>
                            <option value="caixa">💵 DINHEIRO EM MÃO</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Valor</label>
                        <input type="text" id="f_valor" class="premium-input text-2xl metric-number text-center text-slate-800" placeholder="R$ 0,00">
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <button id="btnAddR" class="btn-premium bg-emerald-500 text-white py-4 shadow-lg shadow-emerald-50">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i> Ganho
                        </button>
                        <button id="btnAddP" class="btn-premium bg-rose-500 text-white py-4 shadow-lg shadow-rose-50">
                            <i data-lucide="minus-circle" class="w-5 h-5"></i> Gasto
                        </button>
                    </div>
                </div>

                <!-- SALDOS INICIAIS -->
                <div class="panel p-6">
                    <button id="btnToggleSaldoIni" class="flex items-center justify-between w-full mb-2">
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Saldos Iniciais</span>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                    </button>
                    
                    <div id="wrapSaldoIni" class="collapse-panel">
                        <div class="space-y-5 pt-4 border-t border-slate-100 mt-2">
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <i data-lucide="banknote" class="w-3.5 h-3.5 text-emerald-500"></i>
                                    <label class="text-[9px] font-black uppercase text-slate-400">Dinheiro em Mão</label>
                                </div>
                                <input type="text" id="f_saldo_ini_caixa" class="premium-input text-lg metric-number border-emerald-100" placeholder="R$ 0,00">
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-2">
                                    <i data-lucide="landmark" class="w-3.5 h-3.5 text-orange-500"></i>
                                    <label class="text-[9px] font-black uppercase text-slate-400">Saldo no Inter</label>
                                </div>
                                <input type="text" id="f_saldo_ini_banco" class="premium-input text-lg metric-number border-orange-100" placeholder="R$ 0,00">
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- CONTEÚDO: LISTAGENS -->
            <div class="lg:col-span-8 xl:col-span-9 grid grid-cols-1 xl:grid-cols-2 gap-8">
                
                <section class="space-y-5">
                    <div class="flex items-center gap-3 eyebrow text-emerald-600 border-b border-slate-100 pb-3">
                        <div class="w-2 h-6 bg-emerald-500 rounded-full"></div> Entradas (Ganhos)
                    </div>
                    <div id="listR_pend" class="space-y-3"></div>
                    <div class="history-block pt-6">
                        <button id="btnToggleRConf" class="flex items-center gap-2 text-[10px] font-black uppercase text-slate-400 hover:text-emerald-600 transition-colors">
                            <i data-lucide="check-circle" class="w-4 h-4"></i> Confirmadas (<span id="countR_conf">0</span>)
                        </button>
                        <div id="wrapR_conf" class="collapse-panel">
                            <div id="listR_conf" class="space-y-2 mt-3 opacity-60"></div>
                        </div>
                    </div>
                </section>

                <section class="space-y-5">
                    <div class="flex items-center gap-3 eyebrow text-rose-600 border-b border-slate-100 pb-3">
                        <div class="w-2 h-6 bg-rose-500 rounded-full"></div> Saídas (Gastos)
                    </div>
                    <div id="listP_pend" class="space-y-3"></div>
                    <div class="history-block pt-6">
                        <button id="btnTogglePConf" class="flex items-center gap-2 text-[10px] font-black uppercase text-slate-400 hover:text-rose-600 transition-colors">
                            <i data-lucide="check-circle" class="w-4 h-4"></i> Quitadas (<span id="countP_conf">0</span>)
                        </button>
                        <div id="wrapP_conf" class="collapse-panel">
                            <div id="listP_conf" class="space-y-2 mt-3 opacity-60"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>

<!-- MODAL EDICAO -->
<div id="editModal" class="hidden fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="panel w-full max-w-md p-8 space-y-5">
        <h3 class="text-sm font-black uppercase tracking-widest text-slate-700">Editar Registro</h3>
        <div>
            <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Dia</label>
            <input type="number" id="edit_dia" class="premium-input">
        </div>
        <div>
            <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Descrição</label>
            <input type="text" id="edit_desc" class="premium-input uppercase">
        </div>
        <div>
            <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Valor</label>
            <input type="text" id="edit_valor" class="premium-input text-center text-xl metric-number">
        </div>
        <div>
            <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Conta</label>
            <select id="edit_conta" class="premium-select">
                <option value="banco">🏦 INTER</option>
                <option value="caixa">💵 DINHEIRO</option>
            </select>
        </div>
        <div class="flex items-center gap-3">
            <input type="checkbox" id="edit_ok" class="w-5 h-5 rounded-md text-orange-600">
            <label for="edit_ok" class="text-xs font-bold text-slate-600 uppercase">Confirmado / Quitado</label>
        </div>
        <div class="grid grid-cols-2 gap-3 pt-2">
            <button onclick="closeEditModal()" class="btn-premium bg-slate-100 text-slate-600">Cancelar</button>
            <button onclick="saveEdit()" class="btn-premium bg-[#ff7a00] text-white">Salvar</button>
        </div>
    </div>
</div>

<!-- MODAL TRANSFERÊNCIA -->
<div id="transferModal" class="hidden fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="panel w-full max-w-md p-8 space-y-5">
        <h3 class="text-sm font-black uppercase tracking-widest text-slate-700">Transferência de Capital</h3>
        <div>
            <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Valor</label>
            <input type="text" id="trans_valor" class="premium-input text-center text-2xl metric-number" placeholder="R$ 0,00">
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-[10px] font-black uppercase text-slate-400 block mb-2">Sair de:</label>
                <select id="trans_origem" class="premium-select">
                    <option value="banco">INTER</option>
                    <option value="caixa">DINHEIRO</option>
                </select>
            </div>
            <div class="flex items-center justify-center pt-6 text-slate-300">
                <i data-lucide="arrow-right"></i>
            </div>
        </div>
        <button onclick="executeTransfer()" class="btn-premium w-full bg-[#ff7a00] text-white py-4 shadow-lg shadow-orange-100">Executar Transferência</button>
        <button onclick="document.getElementById('transferModal').classList.add('hidden')" class="w-full text-[10px] font-black uppercase text-slate-400 mt-2">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCi8znMRngui3EI6tODeuczGcUV2o3U90c",
        authDomain: "financeiro-guilherme-49a5b.firebaseapp.com",
        projectId: "financeiro-guilherme-49a5b",
        storageBucket: "financeiro-guilherme-49a5b.firebasestorage.app",
        messagingSenderId: "61246912262",
        appId: "1:61246912262:web:75273e5394d837e6e69087"
    };

    const app = initializeApp(firebaseConfig);
    const db_fire = getFirestore(app);
    let db = {};
    let editingItem = null;
    let modoUltraFoco = localStorage.getItem('ultraFoco') === 'true';

    const formatBRL = (v) => Number(v || 0).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    const parseBRL = (t) => parseFloat(String(t || '').replace(/[R$\s.]/g, '').replace(',', '.')) || 0;

    function applyMoneyMask(input) {
        let v = input.value.replace(/\D/g, '');
        v = (v / 100).toFixed(2).replace('.', ',');
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, '$1.$2.$3,');
        v = v.replace(/(\d)(\d{3}),/g, '$1.$2,');
        input.value = v === '0,00' ? '' : 'R$ ' + v;
    }

    function getMonthKey() {
        return `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
    }

    async function init() {
        setupSelectors();
        await loadData();
        bindEvents();
        render();
        if(modoUltraFoco) document.body.classList.add('ultra-focus');
        lucide.createIcons();
    }

    function setupSelectors() {
        const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        const mSel = document.getElementById('f_mes');
        const aSel = document.getElementById('f_ano');
        const now = new Date();
        meses.forEach((m, i) => mSel.innerHTML += `<option value="${i}">${m.toUpperCase()}</option>`);
        for (let y = now.getFullYear() + 2; y >= 2023; y--) aSel.innerHTML += `<option value="${y}">${y}</option>`;
        mSel.value = now.getMonth();
        aSel.value = now.getFullYear();
        mSel.onchange = render;
        aSel.onchange = render;
    }

    async function loadData() {
        try {
            const snap = await getDocs(collection(db_fire, "financeiro"));
            snap.forEach(d => db[d.id] = d.data());
        } catch (e) { console.error(e); }
    }

    async function sync(id) {
        document.getElementById('statusSync').innerHTML = `<div class="w-2 h-2 rounded-full bg-blue-500 loading-dot"></div> Sincronizando...`;
        try {
            await setDoc(doc(db_fire, "financeiro", id), db[id]);
            document.getElementById('statusSync').innerHTML = `<div class="w-2 h-2 rounded-full bg-emerald-500"></div> Sincronizado`;
        } catch (e) { 
            document.getElementById('statusSync').innerHTML = `<div class="w-2 h-2 rounded-full bg-rose-500"></div> Erro`;
        }
    }

    function render() {
        const id = getMonthKey();
        if (!db[id]) db[id] = { R: [], P: [], saldoIniCaixa: 0, saldoIniBanco: 0 };
        const data = db[id];

        document.getElementById('f_saldo_ini_caixa').value = data.saldoIniCaixa ? formatBRL(data.saldoIniCaixa) : '';
        document.getElementById('f_saldo_ini_banco').value = data.saldoIniBanco ? formatBRL(data.saldoIniBanco) : '';

        const lists = { 
            Rp: document.getElementById('listR_pend'), Rc: document.getElementById('listR_conf'),
            Pp: document.getElementById('listP_pend'), Pc: document.getElementById('listP_conf')
        };
        Object.values(lists).forEach(l => l.innerHTML = '');

        let tR = 0, tP = 0, sCaixa = Number(data.saldoIniCaixa || 0), sBanco = Number(data.saldoIniBanco || 0);
        let cR = 0, cP = 0;

        const createRow = (item, type) => `
            <div class="entry-row flex items-center gap-4 p-4 rounded-2xl shadow-sm">
                <input type="checkbox" ${item.ok ? 'checked' : ''} onchange="window.toggleItem('${type}', ${item.id})" class="w-5 h-5 cursor-pointer accent-orange-500">
                <div class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-xl text-xs font-black text-slate-400 border border-slate-100">${String(item.dia).padStart(2,'0')}</div>
                <div class="flex-1 min-w-0">
                    <div class="text-xs font-black text-slate-700 truncate ${item.ok ? 'line-through opacity-30' : ''}">${item.desc}</div>
                    <div class="text-[9px] font-extrabold uppercase mt-1 ${item.conta === 'caixa' ? 'text-emerald-500' : 'text-orange-500'}">
                        ${item.conta === 'caixa' ? '💵 DINHEIRO' : '🏦 INTER'}
                    </div>
                </div>
                <div class="metric-number text-sm font-bold ${type === 'R' ? 'text-emerald-600' : 'text-rose-500'}">${formatBRL(item.valor)}</div>
                <div class="flex gap-1 ml-2">
                    <button onclick="window.editItem('${type}', ${item.id})" class="p-2 text-slate-300 hover:text-orange-500 transition-colors"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                    <button onclick="window.delItem('${type}', ${item.id})" class="p-2 text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>
        `;

        data.R.sort((a,b) => a.dia - b.dia).forEach(item => {
            tR += Number(item.valor);
            if (item.ok) {
                if (item.conta === 'caixa') sCaixa += Number(item.valor); else sBanco += Number(item.valor);
                lists.Rc.innerHTML += createRow(item, 'R'); cR++;
            } else {
                lists.Rp.innerHTML += createRow(item, 'R');
            }
        });

        data.P.sort((a,b) => a.dia - b.dia).forEach(item => {
            tP += Number(item.valor);
            if (item.ok) {
                if (item.conta === 'caixa') sCaixa -= Number(item.valor); else sBanco -= Number(item.valor);
                lists.Pc.innerHTML += createRow(item, 'P'); cP++;
            } else {
                lists.Pp.innerHTML += createRow(item, 'P');
            }
        });

        document.getElementById('totalR').innerText = formatBRL(tR);
        document.getElementById('totalP').innerText = formatBRL(tP);
        document.getElementById('totalSaldo').innerText = formatBRL((sCaixa + sBanco) + (tR - data.R.filter(x=>x.ok).reduce((a,b)=>a+b.valor,0)) - (tP - data.P.filter(x=>x.ok).reduce((a,b)=>a+b.valor,0)));
        document.getElementById('realMao').innerText = formatBRL(sCaixa + sBanco);
        document.getElementById('saldoCaixa').innerText = `Dinheiro: ${formatBRL(sCaixa)}`;
        document.getElementById('saldoBanco').innerText = `Inter: ${formatBRL(sBanco)}`;
        document.getElementById('countR_conf').innerText = cR;
        document.getElementById('countP_conf').innerText = cP;

        lucide.createIcons();
    }

    function bindEvents() {
        const vInput = document.getElementById('f_valor');
        vInput.oninput = () => applyMoneyMask(vInput);
        document.getElementById('f_saldo_ini_caixa').oninput = (e) => applyMoneyMask(e.target);
        document.getElementById('f_saldo_ini_banco').oninput = (e) => applyMoneyMask(e.target);
        document.getElementById('trans_valor').oninput = (e) => applyMoneyMask(e.target);
        
        document.getElementById('f_saldo_ini_caixa').onblur = (e) => {
            db[getMonthKey()].saldoIniCaixa = parseBRL(e.target.value);
            sync(getMonthKey()); render();
        };
        document.getElementById('f_saldo_ini_banco').onblur = (e) => {
            db[getMonthKey()].saldoIniBanco = parseBRL(e.target.value);
            sync(getMonthKey()); render();
        };

        document.getElementById('btnAddR').onclick = () => addItem('R');
        document.getElementById('btnAddP').onclick = () => addItem('P');
        document.getElementById('btnToggleSaldoIni').onclick = () => document.getElementById('wrapSaldoIni').classList.toggle('open');
        document.getElementById('btnToggleRConf').onclick = () => document.getElementById('wrapR_conf').classList.toggle('open');
        document.getElementById('btnTogglePConf').onclick = () => document.getElementById('wrapP_conf').classList.toggle('open');
        
        document.getElementById('btnTransferencia').onclick = () => document.getElementById('transferModal').classList.remove('hidden');

        document.getElementById('btnUltraFocus').onclick = () => {
            modoUltraFoco = !modoUltraFoco;
            localStorage.setItem('ultraFoco', modoUltraFoco);
            document.body.classList.toggle('ultra-focus');
        };

        document.getElementById('btnExportJSON').onclick = () => {
            const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `backup_v29_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        };
    }

    async function addItem(type) {
        const desc = document.getElementById('f_desc').value.trim().toUpperCase();
        const valor = parseBRL(document.getElementById('f_valor').value);
        const dia = Math.min(31, Math.max(1, parseInt(document.getElementById('f_dia').value) || new Date().getDate()));
        const parc = parseInt(document.getElementById('f_parc').value) || 1;
        const conta = document.getElementById('f_conta').value;

        if (!desc || valor <= 0) return alert("Preencha descrição e valor.");

        let m = parseInt(document.getElementById('f_mes').value);
        let a = parseInt(document.getElementById('f_ano').value);

        for (let i = 0; i < parc; i++) {
            const key = `${m}_${a}`;
            if (!db[key]) db[key] = { R: [], P: [], saldoIniCaixa: 0, saldoIniBanco: 0 };
            db[key][type].push({ id: Date.now() + Math.random(), dia, desc: parc > 1 ? `${desc} (${i+1}/${parc})` : desc, valor, ok: false, conta });
            await sync(key);
            if (++m > 11) { m = 0; a++; }
        }

        document.getElementById('f_desc').value = '';
        document.getElementById('f_valor').value = '';
        document.getElementById('f_dia').focus();
        render();
    }

    window.executeTransfer = async () => {
        const valor = parseBRL(document.getElementById('trans_valor').value);
        const origem = document.getElementById('trans_origem').value;
        const destino = origem === 'banco' ? 'caixa' : 'banco';
        const key = getMonthKey();

        if (valor <= 0) return alert("Valor inválido.");

        const dLabel = destino === 'caixa' ? 'DINHEIRO' : 'INTER';
        const oLabel = origem === 'caixa' ? 'DINHEIRO' : 'INTER';

        db[key].P.push({ id: Date.now(), dia: new Date().getDate(), desc: `TRANSF. P/ ${dLabel}`, valor, ok: true, conta: origem });
        db[key].R.push({ id: Date.now()+1, dia: new Date().getDate(), desc: `TRANSF. DE ${oLabel}`, valor, ok: true, conta: destino });

        await sync(key);
        document.getElementById('transferModal').classList.add('hidden');
        render();
    };

    window.toggleItem = async (type, id) => {
        const key = getMonthKey();
        const item = db[key][type].find(x => x.id === id);
        if (item) item.ok = !item.ok;
        await sync(key); render();
    };

    window.delItem = async (type, id) => {
        if (!confirm("Excluir lançamento?")) return;
        const key = getMonthKey();
        db[key][type] = db[key][type].filter(x => x.id !== id);
        await sync(key); render();
    };

    window.editItem = (type, id) => {
        const key = getMonthKey();
        const item = db[key][type].find(x => x.id === id);
        editingItem = { type, id, key };
        document.getElementById('edit_dia').value = item.dia;
        document.getElementById('edit_desc').value = item.desc;
        document.getElementById('edit_valor').value = formatBRL(item.valor);
        document.getElementById('edit_conta').value = item.conta || 'banco';
        document.getElementById('edit_ok').checked = item.ok;
        document.getElementById('editModal').classList.remove('hidden');
        document.getElementById('edit_valor').oninput = (e) => applyMoneyMask(e.target);
    };

    window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');

    window.saveEdit = async () => {
        const item = db[editingItem.key][editingItem.type].find(x => x.id === editingItem.id);
        item.dia = parseInt(document.getElementById('edit_dia').value);
        item.desc = document.getElementById('edit_desc').value.toUpperCase();
        item.valor = parseBRL(document.getElementById('edit_valor').value);
        item.conta = document.getElementById('edit_conta').value;
        item.ok = document.getElementById('edit_ok').checked;
        await sync(editingItem.key);
        render();
        closeEditModal();
    };

    init();
</script>
</body>
</html>
