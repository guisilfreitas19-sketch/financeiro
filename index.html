<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Financeiro Pro v9 - Realizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .item-ok { opacity: 0.3; text-decoration: line-through; filter: grayscale(1); }
        @media print { .no-print { display: none !important; } body { overflow: visible; height: auto; } }
        .progress-bar { transition: width 0.8s ease-in-out; }
        .cursor-edit { cursor: pointer; transition: background 0.2s; }
        .cursor-edit:hover { background-color: #f0f9ff; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto h-full flex flex-col gap-4">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 shrink-0">
            <div class="bg-white p-4 rounded shadow border-l-4 border-blue-400">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Saldo Inicial</p>
                <input type="text" id="f_saldo_ini" oninput="moneyMask(this); updateSaldoIni()" placeholder="R$ 0,00" class="text-xl font-black text-blue-600 bg-transparent outline-none w-full">
            </div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-green-500">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Total Entradas (Previsto)</p>
                <h2 id="displayReceber" class="text-xl font-black text-green-600 font-mono">R$ 0,00</h2>
            </div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-red-500">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Total Saídas (Previsto)</p>
                <h2 id="displayPagar" class="text-xl font-black text-red-600 font-mono">R$ 0,00</h2>
            </div>
            <div id="boxSaldo" class="bg-slate-800 p-4 rounded shadow text-white">
                <p class="text-[10px] font-bold uppercase opacity-70">Saldo Final Previsto</p>
                <h2 id="displaySaldo" class="text-xl font-black font-mono">R$ 0,00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 shrink-0 bg-slate-200 p-2 rounded-lg border border-slate-300">
            <div class="flex items-center justify-between px-4 py-1 bg-white rounded shadow-sm">
                <span class="text-[9px] font-black text-slate-400 uppercase">Já Recebido:</span>
                <span id="realRecebido" class="text-sm font-bold text-green-600 font-mono">R$ 0,00</span>
            </div>
            <div class="flex items-center justify-between px-4 py-1 bg-white rounded shadow-sm">
                <span class="text-[9px] font-black text-slate-400 uppercase">Já Pago:</span>
                <span id="realPago" class="text-sm font-bold text-red-600 font-mono">R$ 0,00</span>
            </div>
            <div class="flex items-center justify-between px-4 py-1 bg-slate-700 rounded shadow-sm">
                <span class="text-[9px] font-black text-slate-300 uppercase italic">Saldo em Mão:</span>
                <span id="realSaldo" class="text-sm font-bold text-white font-mono">R$ 0,00</span>
            </div>
        </div>

        <div class="bg-white p-4 rounded shadow shrink-0">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-bold text-gray-500 uppercase">Comprometimento da Renda (Previsto)</span>
                <span id="percSaude" class="text-xs font-black text-gray-700">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                <div id="barraSaude" class="progress-bar h-full bg-green-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="flex-1 grid grid-cols-1 md:grid-cols-12 gap-4 min-h-0">
            <div class="md:col-span-4 bg-white p-5 rounded shadow space-y-4 no-print shrink-0 border-t-4 border-blue-500">
                <h2 id="formTitle" class="font-bold text-blue-600 text-xs uppercase tracking-widest">Novo Registro</h2>
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <input type="number" id="f_dia" placeholder="DIA" class="w-16 border p-2 rounded font-bold text-center bg-gray-50 uppercase placeholder:text-gray-400">
                        <input type="text" id="f_desc" placeholder="DESCRIÇÃO" class="flex-1 border p-2 rounded uppercase text-sm font-bold bg-gray-50">
                    </div>
                    <input type="text" id="f_valor" oninput="moneyMask(this)" placeholder="VALOR R$ 0,00" class="w-full border p-3 rounded font-mono font-bold text-xl text-blue-700 bg-gray-50">
                    
                    <div id="btnGroup" class="flex gap-2">
                        <button id="btnR" onclick="addItem('R')" class="flex-1 bg-green-500 text-white font-black py-4 rounded-xl hover:bg-green-600 shadow active:scale-95 transition-all uppercase text-xs">Receber</button>
                        <button id="btnP" onclick="addItem('P')" class="flex-1 bg-red-500 text-white font-black py-4 rounded-xl hover:bg-red-600 shadow active:scale-95 transition-all uppercase text-xs">Pagar</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2 pt-2">
                        <button onclick="window.print()" class="border border-gray-300 py-2 rounded font-bold text-[10px] uppercase text-gray-500">Imprimir</button>
                        <button onclick="limparTudo()" class="border border-red-100 py-2 rounded font-bold text-[10px] uppercase text-red-300">Resetar</button>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4 h-full overflow-hidden">
                <div class="bg-white rounded shadow flex flex-col overflow-hidden border-t-4 border-green-400">
                    <div class="bg-green-50 p-2 text-green-700 font-bold text-[10px] uppercase text-center shrink-0">Entradas</div>
                    <div id="listR" class="p-2 space-y-1 overflow-y-auto"></div>
                </div>
                <div class="bg-white rounded shadow flex flex-col overflow-hidden border-t-4 border-red-400">
                    <div class="bg-red-50 p-2 text-red-700 font-bold text-[10px] uppercase text-center shrink-0">Saídas</div>
                    <div id="listP" class="p-2 space-y-1 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ds = JSON.parse(localStorage.getItem('fin_v9')) || { P: [], R: [], saldoIni: 0 };
        let editId = null;

        function moneyMask(i) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            i.value = 'R$ ' + v;
        }

        function parseMoney(val) {
            return parseFloat(String(val).replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
        }

        function updateSaldoIni() {
            ds.saldoIni = parseMoney(document.getElementById('f_saldo_ini').value);
            saveAndRef();
        }

        function addItem(type) {
            const d = document.getElementById('f_dia').value || "0";
            const s = document.getElementById('f_desc').value;
            const v = parseMoney(document.getElementById('f_valor').value);

            if(!s || v === 0) return;

            if(editId) {
                ds.R = ds.R.filter(i => i.id !== editId);
                ds.P = ds.P.filter(i => i.id !== editId);
                editId = null;
                resetFormStyle();
            }

            ds[type].push({ id: Date.now(), dia: parseInt(d), desc: s.toUpperCase(), valor: v, ok: false });
            ds[type].sort((a,b) => a.dia - b.dia);
            
            saveAndRef();
            clearFields();
        }

        function prepareEdit(type, id) {
            const item = ds[type].find(i => i.id === id);
            editId = id;
            document.getElementById('f_dia').value = item.dia;
            document.getElementById('f_desc').value = item.desc;
            document.getElementById('f_valor').value = 'R$ ' + item.valor.toLocaleString('pt-br', {minimumFractionDigits:2});
            document.getElementById('formTitle').innerText = "EDITANDO REGISTRO";
            document.getElementById('formTitle').classList.replace('text-blue-600', 'text-orange-500');
            document.getElementById('btnR').innerText = "SALVAR ALTERAÇÃO";
            document.getElementById('btnP').innerText = "CANCELAR";
            document.getElementById('btnP').setAttribute("onclick", "cancelEdit()");
        }

        function cancelEdit() {
            editId = null;
            clearFields();
            reset
