<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Financeiro v6.4 - Transferências</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #f8fafc; --sidebar: #0f172a; --card-border: #e2e8f0; }
        body { background-color: var(--bg-main); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; color: #1e293b; }
        .app-layout { display: grid; grid-template-columns: 340px 1fr; height: 100vh; }
        .sidebar { background: var(--sidebar); color: white; padding: 2rem; display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        .input-glass { background: rgba(255, 255, 255, 0.03); border: 1.5px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; padding: 12px; font-size: 14px; width: 100%; }
        .main-panel { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; height: 100vh; overflow: hidden; }
        .gradient-banner { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); border-radius: 24px; padding: 1.5rem 2rem; color: white; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .columns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; flex: 1; min-height: 0; }
        .flow-card { background: white; border-radius: 24px; border: 1px solid var(--card-border); display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .scroll-list { flex: 1; overflow-y: auto !important; padding: 1.25rem; }
        .transaction-item { background: #ffffff; border: 1px solid #f1f5f9; padding: 10px 14px; border-radius: 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .transaction-item.done { opacity: 0.4; background: #f8fafc; filter: grayscale(1); }
        .editable:hover { color: #3b82f6; cursor: pointer; text-decoration: underline; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-layout">
    <aside class="sidebar">
        <div class="mb-8 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="layout-dashboard" class="w-6 h-6 text-white"></i></div>
            <h1 class="text-xl font-extrabold tracking-tight">FINANCEIRO <span class="text-blue-500 text-xs">v6.4</span></h1>
        </div>

        <div class="space-y-4 flex-grow">
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="f_dia" class="input-glass font-bold" placeholder="Dia">
                <input type="number" id="f_parc" value="1" class="input-glass font-bold">
            </div>
            <input type="text" id="f_desc" class="input-glass uppercase font-semibold" placeholder="DESCRIÇÃO">
            <select id="f_conta" class="input-glass font-semibold appearance-none">
                <option value="banco">🏦 BANCO INTER</option>
                <option value="vivo">💵 DINHEIRO VIVO</option>
            </select>
            <input type="text" id="f_valor" class="input-glass text-2xl font-black text-blue-400 text-center" placeholder="R$ 0,00">
            
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button id="btnAddR" class="bg-emerald-500 hover:bg-emerald-400 text-white font-extrabold py-4 rounded-2xl uppercase text-[11px]">Receita</button>
                <button id="btnAddP" class="bg-slate-700 hover:bg-slate-600 text-white font-extrabold py-4 rounded-2xl uppercase text-[11px]">Despesa</button>
            </div>

            <button onclick="window.fazerTransferencia()" class="w-full mt-4 border border-blue-500/30 hover:bg-blue-500/10 text-blue-400 font-bold py-3 rounded-xl uppercase text-[10px] flex items-center justify-center gap-2">
                <i data-lucide="arrow-left-right" class="w-4 h-4"></i> Transferir entre Contas
            </button>
        </div>

        <div class="pt-6 border-t border-slate-800 flex justify-between items-center">
            <select id="f_mes" class="bg-transparent text-xs font-bold uppercase text-slate-400 outline-none"></select>
            <select id="f_ano" class="bg-transparent text-xs font-bold text-slate-400 outline-none"></select>
        </div>
    </aside>

    <main class="main-panel">
        <header class="gradient-banner shadow-lg">
            <div>
                <p class="text-blue-100 text-[10px] font-bold uppercase tracking-wider">Saldo Projetado</p>
                <h2 id="totalSaldo" class="text-4xl font-black tracking-tighter">R$ 0,00</h2>
            </div>
            <div class="flex gap-10">
                <div class="text-right">
                    <p class="text-blue-100 text-[9px] font-bold uppercase">Entradas</p>
                    <p id="totalR" class="text-xl font-black text-emerald-300">R$ 0,00</p>
                </div>
                <div class="text-right border-l border-white/20 pl-10">
                    <p class="text-blue-100 text-[9px] font-bold uppercase">Saídas</p>
                    <p id="totalP" class="text-xl font-black text-rose-300">R$ 0,00</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 flex-shrink-0">
            <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                <div><p class="text-[9px] font-bold text-slate-400 uppercase">Inter (Saldo Real)</p><p id="labelBanco" class="text-lg font-black text-slate-800">R$ 0,00</p></div>
                <button onclick="window.ajustarSaldo('initBanco')" class="text-[9px] font-bold text-blue-600 bg-blue-50 px-3 py-2 rounded-lg">AJUSTAR</button>
            </div>
            <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                <div><p class="text-[9px] font-bold text-slate-400 uppercase">Vivo (Saldo Real)</p><p id="labelVivo" class="text-lg font-black text-slate-800">R$ 0,00</p></div>
                <button onclick="window.ajustarSaldo('initVivo')" class="text-[9px] font-bold text-emerald-600 bg-emerald-50 px-3 py-2 rounded-lg">AJUSTAR</button>
            </div>
        </div>

        <div class="columns-grid">
            <section class="flow-card">
                <div class="p-4 border-b font-bold text-slate-700 bg-slate-50 uppercase text-[10px] flex justify-between">
                    <span>Receitas / Entradas</span><i data-lucide="trending-up" class="w-3 h-3 text-emerald-500"></i>
                </div>
                <div class="scroll-list">
                    <div id="listR_pend"></div>
                    <div id="listR_conf" class="mt-4 border-t border-dashed pt-4"></div>
                </div>
            </section>
            <section class="flow-card">
                <div class="p-4 border-b font-bold text-slate-700 bg-slate-50 uppercase text-[10px] flex justify-between">
                    <span>Despesas / Saídas</span><i data-lucide="trending-down" class="w-3 h-3 text-rose-500"></i>
                </div>
                <div class="scroll-list">
                    <div id="listP_pend"></div>
                    <div id="listP_conf" class="mt-4 border-t border-dashed pt-4"></div>
                </div>
            </section>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCi8znMRngui3EI6tODeuczGcUV2o3U90c",
        authDomain: "financeiro-guilherme-49a5b.firebaseapp.com",
        projectId: "financeiro-guilherme-49a5b",
        storageBucket: "financeiro-guilherme-49a5b.firebasestorage.app",
        messagingSenderId: "61246912262",
        appId: "1:61246912262:web:75273e5394d837e6e69087"
    };

    const app = initializeApp(firebaseConfig);
    const db_fire = getFirestore(app);
    let db = {};

    const formatBRL = (v) => Number(v || 0).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    const parseBRL = (t) => parseFloat(String(t || '').replace(/[R$\s.]/g, '').replace(',', '.')) || 0;

    async function init() {
        const mesesArr = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const mS = document.getElementById('f_mes'), aS = document.getElementById('f_ano'), n = new Date();
        mesesArr.forEach((m, i) => mS.innerHTML += `<option value="${i}">${m}</option>`);
        for (let y = n.getFullYear() + 1; y >= 2025; y--) aS.innerHTML += `<option value="${y}">${y}</option>`;
        mS.value = n.getMonth(); aS.value = n.getFullYear();
        mS.onchange = render; aS.onchange = render;

        document.getElementById('f_valor').oninput = function() {
            let v = this.value.replace(/\D/g, '');
            v = (v / 100).toFixed(2).replace('.', ',');
            this.value = v === '0,00' ? '' : 'R$ ' + v;
        };

        document.getElementById('btnAddR').onclick = () => add('R');
        document.getElementById('btnAddP').onclick = () => add('P');

        onSnapshot(collection(db_fire, "financeiro"), (s) => {
            s.forEach(d => db[d.id] = d.data());
            render();
        });
    }

    // FUNÇÃO DE TRANSFERÊNCIA
    window.fazerTransferencia = async () => {
        const valorTxt = prompt("Qual valor deseja transferir?");
        if (!valorTxt) return;
        const valor = parseFloat(valorTxt.replace(/\./g, '').replace(',', '.')) || 0;
        if (valor <= 0) return;

        const de = prompt("De onde saiu? (1 para VIVO, 2 para INTER)");
        const para = (de === "1") ? "banco" : "vivo";
        const de_nome = (de === "1") ? "vivo" : "banco";

        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if (!db[key]) db[key] = { R: [], P: [], initBanco: 0, initVivo: 0 };

        const idBase = Date.now();
        const dia = new Date().getDate();

        // Cria a saída de uma conta e a entrada na outra
        db[key].P.push({ id: idBase, dia, desc: `TRANSF -> ${para.toUpperCase()}`, valor, ok: true, conta: de_nome });
        db[key].R.push({ id: idBase + 1, dia, desc: `TRANSF <- ${de_nome.toUpperCase()}`, valor, ok: true, conta: para });

        await setDoc(doc(db_fire, "financeiro", key), db[key]);
        alert("Transferência realizada com sucesso!");
    };

    window.editItem = async (type, id, campo) => {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const item = db[key][type].find(x => x.id === id);
        if (!item) return;
        if (campo === 'valor') {
            const nv = prompt("Novo Valor:", item.valor.toFixed(2).replace('.', ','));
            if (nv) item.valor = parseFloat(nv.replace(/\./g, '').replace(',', '.')) || 0;
        } else {
            const nd = prompt("Nova Descrição:", item.desc);
            if (nd) item.desc = nd.toUpperCase();
        }
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
    };

    window.trocarConta = async (type, id) => {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const it = db[key][type].find(x => x.id === id);
        if (it) { it.conta = it.conta === 'banco' ? 'vivo' : 'banco'; await setDoc(doc(db_fire, "financeiro", key), db[key]); }
    };

    window.toggleStatus = async (type, id) => {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const it = db[key][type].find(x => x.id === id);
        if (it) { it.ok = !it.ok; await setDoc(doc(db_fire, "financeiro", key), db[key]); }
    };

    window.del = async (type, id) => {
        if (!confirm("Excluir?")) return;
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        db[key][type] = db[key][type].filter(x => x.id !== id);
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
    };

    window.ajustarSaldo = async (campo) => {
        const v = prompt("Saldo REAL atual desta conta:");
        if (!v) return;
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if(!db[key]) db[key] = { R: [], P: [], initBanco: 0, initVivo: 0 };
        
        const saldoReal = parseFloat(v.replace(/\./g, '').replace(',', '.')) || 0;
        let fluxoConf = 0;
        const data = db[key];
        const pertence = (it) => (campo === 'initBanco' ? it.conta === 'banco' : it.conta === 'vivo');

        data.R.forEach(it => { if (it.ok && pertence(it)) fluxoConf += it.valor; });
        data.P.forEach(it => { if (it.ok && pertence(it)) fluxoConf -= it.valor; });

        db[key][campo] = saldoReal - fluxoConf;
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
    };

    function render() {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const data = db[key] || { R: [], P: [], initBanco: 0, initVivo: 0 };
        ['listR_pend', 'listR_conf', 'listP_pend', 'listP_conf'].forEach(id => document.getElementById(id).innerHTML = '');
        let tR = 0, tP = 0, sI = Number(data.initBanco || 0), sV = Number(data.initVivo || 0);

        const buildRow = (it, type) => `
            <div class="transaction-item ${it.ok ? 'done' : ''}">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black text-slate-300">${String(it.dia).padStart(2,'0')}</span>
                    <div>
                        <p onclick="window.editItem('${type}', ${it.id}, 'desc')" class="text-xs font-extrabold text-slate-700 uppercase editable">${it.desc}</p>
                        <button onclick="window.trocarConta('${type}', ${it.id})" class="text-[8px] font-bold uppercase px-1 rounded bg-slate-100 text-slate-500">${it.conta === 'banco' ? 'INTER' : 'VIVO'}</button>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span onclick="window.editItem('${type}', ${it.id}, 'valor')" class="text-xs font-black ${type === 'R' ? 'text-emerald-600' : 'text-rose-600'} editable">${formatBRL(it.valor)}</span>
                    <input type="checkbox" ${it.ok ? 'checked' : ''} onchange="window.toggleStatus('${type}', ${it.id})" class="w-4 h-4 accent-blue-600">
                    <button onclick="window.del('${type}', ${it.id})" class="text-slate-200 hover:text-rose-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                </div>
            </div>`;

        (data.R || []).forEach(it => {
            tR += it.valor; if (it.ok) it.conta === 'banco' ? sI += it.valor : sV += it.valor;
            document.getElementById(it.ok ? 'listR_conf' : 'listR_pend').innerHTML += buildRow(it, 'R');
        });
        (data.P || []).forEach(it => {
            tP += it.valor; if (it.ok) it.conta === 'banco' ? sI -= it.valor : sV -= it.valor;
            document.getElementById(it.ok ? 'listP_conf' : 'listP_pend').innerHTML += buildRow(it, 'P');
        });

        document.getElementById('totalR').innerText = formatBRL(tR);
        document.getElementById('totalP').innerText = formatBRL(tP);
        document.getElementById('labelBanco').innerText = formatBRL(sI);
        document.getElementById('labelVivo').innerText = formatBRL(sV);
        document.getElementById('totalSaldo').innerText = formatBRL((Number(data.initBanco || 0) + Number(data.initVivo || 0) + tR) - tP);
        lucide.createIcons();
    }

    async function add(type) {
        const d = document.getElementById('f_desc').value.toUpperCase(), v = parseBRL(document.getElementById('f_valor').value), dia = parseInt(document.getElementById('f_dia').value) || 1, key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if (!d || v <= 0) return;
        if (!db[key]) db[key] = { R: [], P: [], initBanco: 0, initVivo: 0 };
        db[key][type].push({ id: Date.now(), dia, desc: d, valor: v, ok: false, conta: document.getElementById('f_conta').value });
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
        document.getElementById('f_desc').value = ''; document.getElementById('f_valor').value = '';
    }

    init();
</script>
</body>
</html>
