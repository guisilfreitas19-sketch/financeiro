<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Financeiro v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .item-pago { opacity: 0.3; text-decoration: line-through; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded shadow border-l-4 border-green-500">
                <div class="text-xs text-gray-500 font-bold uppercase">Entradas</div>
                <div id="totalReceber" class="text-xl font-black text-green-600">R$ 0,00</div>
            </div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-red-500">
                <div class="text-xs text-gray-500 font-bold uppercase">Saídas</div>
                <div id="totalPagar" class="text-xl font-black text-red-600">R$ 0,00</div>
            </div>
            <div id="cardSaldo" class="bg-blue-600 p-4 rounded shadow text-white">
                <div class="text-xs font-bold uppercase opacity-80">Saldo</div>
                <div id="saldoGeral" class="text-xl font-black">R$ 0,00</div>
            </div>
            <div class="no-print flex flex-col gap-2">
                <button onclick="window.print()" class="bg-gray-700 text-white p-2 rounded text-xs font-bold uppercase hover:bg-black">Imprimir</button>
                <button onclick="limparTudo()" class="bg-red-100 text-red-600 p-2 rounded text-xs font-bold uppercase hover:bg-red-200">Limpar Mês</button>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 md:col-span-4 bg-white p-6 rounded shadow no-print">
                <h3 class="font-bold mb-4 text-gray-700 uppercase text-sm">Novo Lançamento</h3>
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <div class="w-20">
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Dia</label>
                            <input type="number" id="dia" placeholder="01" class="w-full border p-2 rounded font-bold">
                        </div>
                        <div class="flex-1">
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Descrição</label>
                            <input type="text" id="desc" placeholder="Ex: Aluguel" class="w-full border p-2 rounded uppercase font-semibold">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">Valor</label>
                        <input type="text" id="valor" oninput="mascaraMoeda(this)" placeholder="R$ 0,00" class="w-full border p-2 rounded font-mono font-bold text-lg text-blue-700">
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button onclick="adicionar('receber')" class="flex-1 bg-green-500 text-white font-bold py-3 rounded shadow-lg active:bg-green-700">RECEBER</button>
                        <button onclick="adicionar('pagar')" class="flex-1 bg-red-500 text-white font-bold py-3 rounded shadow-lg active:bg-red-700">PAGAR</button>
                    </div>
                </div>
            </div>

            <div class="col-span-12 md:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white rounded shadow overflow-hidden">
                    <div class="bg-green-50 p-2 text-green-700 font-bold text-[10px] uppercase text-center border-b border-green-100">Entradas</div>
                    <div id="listaReceber" class="p-2 space-y-2"></div>
                </div>
                <div class="bg-white rounded shadow overflow-hidden">
                    <div class="bg-red-50 p-2 text-red-700 font-bold text-[10px] uppercase text-center border-b border-red-100">Saídas</div>
                    <div id="listaPagar" class="p-2 space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('financas_v5')) || { pagar: [], receber: [] };

        function mascaraMoeda(i) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            i.value = 'R$ ' + v;
        }
