<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Financeiro v5.1 - Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; height: 100vh; overflow: hidden; }
        .sidebar-dark { background: #0f172a; color: white; border-radius: 24px; height: 100%; }
        .input-premium { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; padding: 8px; font-weight: 600; font-size: 12px; }
        .card-item { background: white; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 5px; padding: 6px 10px; }
        .done { opacity: 0.4; filter: grayscale(1); }
        .month-summary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; border-radius: 16px; padding: 14px; margin-bottom: 12px; }
        .scroll-list { height: calc(100vh - 360px); overflow-y: auto; }
        .filter-btn { padding: 4px 12px; border-radius: 8px; font-size: 9px; font-weight: 800; text-transform: uppercase; border: 1px solid #e2e8f0; background: white; color: #64748b; }
        .filter-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
        .caixa-item { background: #f1f5f9; padding: 8px 12px; border-radius: 12px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-3 lg:p-4">

<div class="max-w-[1700px] mx-auto h-full">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 h-full">
        
        <aside class="lg:col-span-3 h-full">
            <div class="sidebar-dark p-5 flex flex-col shadow-2xl">
                <div class="flex items-center justify-between mb-4">
                    <h1 class="text-sm font-black italic tracking-tighter text-white">METRA CLOUD <span class="text-blue-500">v5.1</span></h1>
                    <button onclick="window.showTransferPopup()" class="bg-slate-800 p-1.5 rounded-lg text-blue-400 hover:bg-slate-700"><i data-lucide="arrow-left-right" class="w-3.5 h-3.5"></i></button>
                </div>

                <div class="space-y-2 mb-4">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="f_dia" class="input-premium text-center" placeholder="Dia">
                        <input type="number" id="f_parc" value="1" class="input-premium text-center">
                    </div>
                    <input type="text" id="f_desc" class="input-premium w-full uppercase" placeholder="DESCRIÇÃO">
                    <select id="f_conta" class="input-premium w-full text-xs">
                        <option value="banco">🏦 BANCO INTER</option>
                        <option value="vivo">💵 DINHEIRO VIVO</option>
                    </select>
                    <input type="text" id="f_valor" class="input-premium w-full text-lg font-black text-blue-400 text-center" placeholder="R$ 0,00">
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btnAddR" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black py-2.5 rounded-xl uppercase text-[10px]">Entrada</button>
                        <button id="btnAddP" class="bg-slate-700 hover:bg-slate-600 text-white font-black py-2.5 rounded-xl uppercase text-[10px]">Saída</button>
                    </div>
                </div>

                <div class="mt-auto pt-4 border-t border-slate-800">
                    <div class="flex gap-2">
                        <select id="f_mes" class="bg-transparent text-[10px] font-bold uppercase text-slate-500 outline-none"></select>
                        <select id="f_ano" class="bg-transparent text-[10px] font-bold text-slate-500 outline-none"></select>
                    </div>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-9 flex flex-col h-full overflow-hidden">
            <div class="month-summary flex justify-between items-center shadow-md">
                <div>
                    <p class="text-blue-100 text-[9px] font-bold uppercase tracking-widest">Saldo Projetado Final</p>
                    <h2 id="totalSaldo" class="text-3xl font-black">R$ 0,00</h2>
                </div>
                <div class="flex gap-8">
                    <div class="text-right border-l border-white/10 pl-8">
                        <p class="text-blue-100 text-[8px] font-bold uppercase">Entradas</p>
                        <p id="totalR" class="text-base font-black text-emerald-300">R$ 0,00</p>
                    </div>
                    <div class="text-right border-l border-white/10 pl-8">
                        <p class="text-blue-100 text-[8px] font-bold uppercase">Saídas</p>
                        <p id="totalP" class="text-base font-black text-rose-300">R$ 0,00</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 mb-4">
                <div class="bg-white p-1.5 rounded-xl border border-slate-200 flex gap-1 self-start shadow-sm">
                    <button onclick="window.setFilter('all')" id="btn-f-all" class="filter-btn active">Tudo</button>
                    <button onclick="window.setFilter('banco')" id="btn-f-banco" class="filter-btn">Inter</button>
                    <button onclick="window.setFilter('vivo')" id="btn-f-vivo" class="filter-btn">Vivo</button>
                </div>
                <div class="flex-1 grid grid-cols-2 gap-3">
                    <div class="caixa-item flex justify-between items-center">
                        <span class="text-[9px] font-black text-slate-400 uppercase">Banco Inter</span>
                        <h4 id="labelBanco" class="text-sm font-black text-slate-800">R$ 0,00</h4>
                    </div>
                    <div class="caixa-item flex justify-between items-center">
                        <span class="text-[9px] font-black text-slate-400 uppercase">Dinheiro Vivo</span>
                        <h4 id="labelVivo" class="text-sm font-black text-slate-800">R$ 0,00</h4>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 h-full overflow-hidden">
                <div class="flex flex-col">
                    <h3 class="text-[9px] font-black text-slate-400 uppercase mb-2 px-1">Receitas</h3>
                    <div id="listR_wrapper" class="scroll-list">
                        <div id="listR_pend"></div>
                        <div id="listR_conf" class="mt-2 border-t border-slate-100 pt-2"></div>
                    </div>
                </div>
                <div class="flex flex-col">
                    <h3 class="text-[9px] font-black text-slate-400 uppercase mb-2 px-1">Despesas</h3>
                    <div id="listP_wrapper" class="scroll-list">
                        <div id="listP_pend"></div>
                        <div id="listP_conf" class="mt-2 border-t border-slate-100 pt-2"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCi8znMRngui3EI6tODeuczGcUV2o3U90c",
        authDomain: "financeiro-guilherme-49a5b.firebaseapp.com",
        projectId: "financeiro-guilherme-49a5b",
        storageBucket: "financeiro-guilherme-49a5b.firebasestorage.app",
        messagingSenderId: "61246912262",
        appId: "1:61246912262:web:75273e5394d837e6e69087"
    };

    const app = initializeApp(firebaseConfig);
    const db_fire = getFirestore(app);
    let db = {}, currentFilter = 'all';

    const formatBRL = (v) => Number(v || 0).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    const parseBRL = (t) => parseFloat(String(t || '').replace(/[R$\s.]/g, '').replace(',', '.')) || 0;

    async function init() {
        const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const mS = document.getElementById('f_mes'), aS = document.getElementById('f_ano'), n = new Date();
        meses.forEach((m, i) => mS.innerHTML += `<option value="${i}">${m}</option>`);
        for (let y = n.getFullYear() + 1; y >= 2024; y--) aS.innerHTML += `<option value="${y}">${y}</option>`;
        mS.value = n.getMonth(); aS.value = n.getFullYear();
        mS.onchange = render; aS.onchange = render;
        
        document.getElementById('f_valor').oninput = function() {
            let v = this.value.replace(/\D/g, ''); v = (v/100).toFixed(2).replace('.', ',');
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, '$1.$2.$3,').replace(/(\d)(\d{3}),/g, '$1.$2,');
            this.value = v === '0,00' ? '' : 'R$ ' + v;
        };

        document.getElementById('btnAddR').onclick = () => add('R');
        document.getElementById('btnAddP').onclick = () => add('P');
        
        const s = await getDocs(collection(db_fire, "financeiro"));
        s.forEach(d => db[d.id] = d.data());
        render();
    }

    window.setFilter = (f) => {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-f-${f}`).classList.add('active');
        render();
    };

    function render() {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if (!db[key]) db[key] = { R: [], P: [], initBanco:0, initVivo:0 };
        const data = db[key];
        
        ['listR_pend', 'listR_conf', 'listP_pend', 'listP_conf'].forEach(id => document.getElementById(id).innerHTML = '');
        let tr=0, tp=0, sv=data.initVivo||0, sb=data.initBanco||0;

        const row = (it, type) => `
            <div class="card-item flex items-center justify-between ${it.ok ? 'done' : ''}">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black text-slate-400 min-w-[18px]">${String(it.dia).padStart(2,'0')}</span>
                    <div><p class="text-[10px] font-bold text-slate-700 uppercase leading-none">${it.desc}</p>
                    <p class="text-[7px] font-black text-slate-400 mt-0.5 uppercase">${it.conta === 'banco' ? 'Inter' : 'Vivo'}</p></div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black ${type==='R'?'text-emerald-600':'text-rose-600'}">${formatBRL(it.valor)}</span>
                    <input type="checkbox" ${it.ok?'checked':''} onchange="window.tk('${type}', ${it.id})" class="w-3.5 h-3.5 accent-blue-600">
                    <button onclick="window.del('${type}', ${it.id})" class="text-slate-200 hover:text-rose-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>
            </div>`;

        data.R.sort((a,b)=>a.dia-b.dia).forEach(it => {
            tr += it.valor; if(it.ok) (it.conta==='vivo'?sv+=it.valor:sb+=it.valor);
            if(currentFilter==='all' || it.conta===currentFilter) document.getElementById(it.ok?'listR_conf':'listR_pend').innerHTML += row(it, 'R');
        });
        data.P.sort((a,b)=>a.dia-b.dia).forEach(it => {
            tp += it.valor; if(it.ok) (it.conta==='vivo'?sv-=it.valor:sb-=it.valor);
            if(currentFilter==='all' || it.conta===currentFilter) document.getElementById(it.ok?'listP_conf':'listP_pend').innerHTML += row(it, 'P');
        });

        document.getElementById('totalR').innerText = formatBRL(tr);
        document.getElementById('totalP').innerText = formatBRL(tp);
        document.getElementById('labelBanco').innerText = formatBRL(sb);
        document.getElementById('labelVivo').innerText = formatBRL(sv);
        document.getElementById('totalSaldo').innerText = formatBRL((data.initBanco + data.initVivo + tr) - tp);
        lucide.createIcons();
    }

    async function add(type) {
        const d = document.getElementById('f_desc').value.toUpperCase(), v = parseBRL(document.getElementById('f_valor').value), dia = parseInt(document.getElementById('f_dia').value) || 1, key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if(!d || v <= 0) return;
        if (!db[key]) db[key] = { R: [], P: [], initBanco:0, initVivo:0 };
        db[key][type].push({ id: Date.now(), dia, desc: d, valor: v, ok: false, conta: document.getElementById('f_conta').value });
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
        document.getElementById('f_desc').value = ''; document.getElementById('f_valor').value = ''; render();
    }

    window.tk = async (type, id) => {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const it = db[key][type].find(x=>x.id===id); it.ok = !it.ok;
        await setDoc(doc(db_fire, "financeiro", key), db[key]); render();
    };

    window.del = async (type, id) => {
        if(!confirm("Excluir?")) return;
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        db[key][type] = db[key][type].filter(x=>x.id!==id);
        await setDoc(doc(db_fire, "financeiro", key), db[key]); render();
    };

    init();
</script>
</body>
</html>
