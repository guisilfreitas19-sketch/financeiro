<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Mensal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100vh; background-color: #f8fafc; font-family: sans-serif; }
        .money-input { text-align: right; }
        .item-pago { opacity: 0.4; text-decoration: line-through; filter: grayscale(1); }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; overflow: visible; height: auto; }
            .print-area { grid-column: span 12 / span 12 !important; display: block !important; }
            .card-container { border: 1px solid #ddd !important; margin-bottom: 20px; box-shadow: none !important; }
            .print-footer { display: block !important; position: fixed; bottom: 0; width: 100%; text-align: center; font-size: 10px; color: #666; }
        }
        .print-footer { display: none; }
    </style>
</head>
<body class="p-4 overflow-hidden">

    <div class="max-w-[1400px] mx-auto h-full flex flex-col gap-4">
        
        <div class="grid grid-cols-4 gap-4 h-24">
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center">
                <span class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Total Entradas</span>
                <span id="totalReceber" class="text-2xl font-black text-green-600 font-mono">R$ 0,00</span>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center">
                <span class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Total Saídas</span>
                <span id="totalPagar" class="text-2xl font-black text-red-600 font-mono">R$ 0,00</span>
            </div>
            <div id="cardSaldo" class="p-4 rounded-xl shadow-md flex flex-col justify-center transition-colors duration-500">
                <span class="text-[10px] opacity-80 uppercase font-bold tracking-wider text-white">Saldo Previsto</span>
                <span id="saldoGeral" class="text-2xl font-black text-white font-mono">R$ 0,00</span>
            </div>
            <div class="no-print flex flex-col gap-2 justify-center">
                <button onclick="window.print()" class="bg-gray-800 text-white font-bold py-2 rounded-lg text-[10px] uppercase hover:bg-black transition-all">🖨️ Gerar Relatório</button>
                <button onclick="limparMes()" class="bg-white border border-red-100 text-red-400 font-bold py-2 rounded-lg text-[10px] uppercase hover:bg-red-50 transition-all">🗑️ Resetar Mês</button>
            </div>
        </div>

        <div class="flex-1 grid grid-cols-12 gap-4 overflow-hidden">
            
            <div class="col-span-3 bg-white p-6 rounded-xl border border-gray-200 shadow-sm no-print">
                <h2 class="font-bold text-gray-700 mb-6 border-b pb-2 text-xs uppercase tracking-widest">Novo Registro</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-4 gap-2">
                        <div class="col-span-1">
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase text-center">Dia</label>
                            <input type="number" id="dia" min="1" max="31" class="w-full border-b-2 border-gray-100 p-2 text-center focus:border-blue-500 outline-none text-sm font-bold">
                        </div>
                        <div class="col-span-3">
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Descrição</label>
                            <input type="text" id="desc" class="w-full border-b-2 border-gray-100 p-2 focus:border-blue-500 outline-none text-sm font-medium uppercase">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Valor</label>
                        <input type="text" id="valor" oninput="mascaraMoeda(this)" placeholder="R$ 0,00" class="money-input w-full border-b-2 border-gray-100 p-2 focus:border-blue-500 outline-none font-mono font-bold text-blue-700 text-xl">
                    </div>
                    <div class="flex gap-2 pt-4">
                        <button onclick="adicionar('receber')" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl text-xs uppercase shadow-lg shadow-green-100">Receber</button>
                        <button onclick="adicionar('pagar')" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-black py-4 rounded-xl text-xs uppercase shadow-lg shadow-red-100">Pagar</button>
                    </div>
                </div>
            </div>

            <div class="print-area col-span-9 grid grid-cols-2 gap-4 overflow-hidden h-full">
                <div class="card-container bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col overflow-hidden">
                    <div class="p-3 bg-green-50 border-b border-green-100 font-black text-green-700 text-[10px] uppercase flex justify-between">
                        <span>Lançamentos de Entrada</span>
                    </div>
                    <div id="listaReceber" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
                </div>

                <div class="card-container bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col overflow-hidden">
                    <div class="p-3 bg-red-50 border-b border-red-100 font-black text-red-700 text-[10px] uppercase flex justify-between">
                        <span>Contas a Pagar</span>
                    </div>
                    <div id="listaPagar" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="print-footer">
        Relatório Mensal de Controle Financeiro - Gerado em <span id="dataPrint"></span>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('financas_v3')) || { pagar: [], receber: [] };

        function mascaraMoeda(i) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            i.value = 'R$ ' + v;
        }

        function formatarParaReal(valor) {
            return valor.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
        }

        function adicionar(tipo) {
            const dia = document.getElementById('dia').value || "00";
            const desc = document.getElementById('desc').value;
            const valorRaw = document.getElementById('valor').value.replace(/[R$\s.]/g, '').replace(',', '.');
            const valor = parseFloat(valorRaw);

            if(!desc || isNaN(valor)) return;

            db[tipo].push({ id: Date.now(), dia: parseInt(dia), desc, valor, status: 'pendente' });
            
            // ORDENAÇÃO POR DIA
            db[tipo].sort((a, b) => a.dia - b.dia);
            
            salvar();
            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
            document.getElementById('dia').value = '';
        }

        function toggleStatus(tipo, id) {
            const item = db[tipo].find(i => i.id === id);
            item.status = item.status === 'pago' ? 'pendente' : 'pago';
            salvar();
        }

        function remover(tipo, id) {
            db[tipo] = db[tipo].filter(item => item.id !== id);
            salvar();
        }

        function limparMes() {
            if(confirm("Deseja apagar todos os dados deste mês?")) {
                db = { pagar: [], receber: [] };
                salvar();
            }
        }

        function salvar() {
            localStorage.setItem('financas_v3', JSON.stringify(db));
            renderizar();
        }

        function renderizar() {
            const lPagar = document.getElementById('listaPagar');
            const lReceber = document.getElementById('listaReceber');
            lPagar.innerHTML = lReceber.innerHTML = '';
            let totalP = 0, totalR = 0;

            const criarItem = (item, tipo) => {
                const isPago = item.status === 'pago';
                const cor = tipo === 'receber' ? 'green' : 'red';
                return `
                    <div class="flex justify-between items-center p-2 bg-white border border-gray-100 rounded-lg shadow-sm ${isPago ? 'item-pago' : ''}">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${isPago ? 'checked' : ''} onclick="toggleStatus('${tipo}', ${item.id})" class="no-print w-4 h-4 cursor-pointer">
                            <span class="text-[10px] font-bold bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">${String(item.dia).padStart(2, '0')}</span>
                            <span class="text-xs font-bold text-gray-700 uppercase">${item.desc}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-${cor}-600 font-mono">${formatarParaReal(item.valor)}</span>
