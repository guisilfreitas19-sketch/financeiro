<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Financeiro v5.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar-dark { background: #0f172a; color: white; border-radius: 24px; height: 100%; }
        .input-premium { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; padding: 8px; font-weight: 600; font-size: 12px; }
        .card-item { background: white; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 4px; padding: 6px 10px; }
        .done { opacity: 0.4; filter: grayscale(1); background: #f1f5f9; }
        .month-summary { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .scroll-list { height: calc(100vh - 350px); overflow-y: auto; padding-right: 4px; }
        .filter-btn { padding: 4px 14px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: 1px solid #e2e8f0; background: white; color: #64748b; }
        .filter-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
        .caixa-card { background: white; padding: 10px 14px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .btn-edit-saldo { cursor: pointer; transition: all 0.2s; }
        .btn-edit-saldo:hover { transform: scale(1.1); opacity: 0.7; }
    </style>
</head>
<body class="p-3 lg:p-4">

<div class="max-w-[1750px] mx-auto h-full">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 h-full">
        
        <aside class="lg:col-span-3 h-full">
            <div class="sidebar-dark p-6 flex flex-col shadow-2xl">
                <div class="flex items-center justify-between mb-6">
                    <h1 class="text-sm font-black tracking-tighter text-white uppercase italic">FINANCEIRO <span class="text-blue-500 text-[10px]">v5.5</span></h1>
                    <i data-lucide="wallet" class="w-4 h-4 text-slate-500"></i>
                </div>

                <div class="space-y-3 mb-6">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="f_dia" class="input-premium text-center" placeholder="Dia">
                        <input type="number" id="f_parc" value="1" class="input-premium text-center">
                    </div>
                    <input type="text" id="f_desc" class="input-premium w-full uppercase" placeholder="DESCRIÇÃO">
                    <select id="f_conta" class="input-premium w-full text-xs">
                        <option value="banco">🏦 BANCO INTER</option>
                        <option value="vivo">💵 DINHEIRO VIVO</option>
                    </select>
                    <input type="text" id="f_valor" class="input-premium w-full text-xl font-black text-blue-400 text-center" placeholder="R$ 0,00">
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btnAddR" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl uppercase text-[10px]">Entrada</button>
                        <button id="btnAddP" class="bg-slate-700 hover:bg-slate-600 text-white font-black py-3 rounded-xl uppercase text-[10px]">Saída</button>
                    </div>
                </div>

                <div class="mt-auto pt-4 border-t border-slate-800 flex gap-3">
                    <select id="f_mes" class="bg-transparent text-[11px] font-bold uppercase text-slate-400 outline-none"></select>
                    <select id="f_ano" class="bg-transparent text-[11px] font-bold text-slate-400 outline-none"></select>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-9 flex flex-col h-full">
            <div class="month-summary flex justify-between items-center shadow-lg">
                <div>
                    <p class="text-blue-100 text-[10px] font-extrabold uppercase tracking-widest mb-1">Saldo Projetado Final (Mês)</p>
                    <h2 id="totalSaldo" class="text-4xl font-black italic">R$ 0,00</h2>
                </div>
                <div class="flex gap-10">
                    <div class="text-right border-l border-white/20 pl-10">
                        <p class="text-blue-100 text-[9px] font-bold uppercase mb-1">Total Receitas</p>
                        <p id="totalR" class="text-xl font-black text-emerald-300">R$ 0,00</p>
                    </div>
                    <div class="text-right border-l border-white/20 pl-10">
                        <p class="text-blue-100 text-[9px] font-bold uppercase mb-1">Total Despesas</p>
                        <p id="totalP" class="text-xl font-black text-rose-300">R$ 0,00</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 mb-4 items-center">
                <div class="bg-white p-1.5 rounded-xl border border-slate-200 flex gap-1 shadow-sm">
                    <button onclick="window.setFilter('all')" id="btn-f-all" class="filter-btn active">Tudo</button>
                    <button onclick="window.setFilter('banco')" id="btn-f-banco" class="filter-btn">Inter</button>
                    <button onclick="window.setFilter('vivo')" id="btn-f-vivo" class="filter-btn">Vivo</button>
                </div>
                
                <div class="flex-1 grid grid-cols-2 gap-3 w-full">
                    <div class="caixa-card flex justify-between items-center border-l-4 border-l-blue-500 shadow-sm">
                        <div>
                            <span class="text-[9px] font-black text-slate-400 uppercase">Banco Inter (Atual)</span>
                            <h4 id="labelBanco" class="text-base font-black text-slate-800">R$ 0,00</h4>
                        </div>
                        <button onclick="window.ajustarSaldo('initBanco')" class="btn-edit-saldo text-blue-200">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="caixa-card flex justify-between items-center border-l-4 border-l-emerald-500 shadow-sm">
                        <div>
                            <span class="text-[9px] font-black text-slate-400 uppercase">Dinheiro Vivo (Atual)</span>
                            <h4 id="labelVivo" class="text-base font-black text-slate-800">R$ 0,00</h4>
                        </div>
                        <button onclick="window.ajustarSaldo('initVivo')" class="btn-edit-saldo text-emerald-200">
                            <i data-lucide="banknote" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 h-full overflow-hidden">
                <div class="flex flex-col">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-tighter mb-2 px-1">Fluxo de Receitas</h3>
                    <div id="listR_wrapper" class="scroll-list">
                        <div id="listR_pend"></div>
                        <div id="listR_conf" class="mt-4 border-t border-dashed border-slate-200 pt-3"></div>
                    </div>
                </div>
                <div class="flex flex-col">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-tighter mb-2 px-1">Fluxo de Despesas</h3>
                    <div id="listP_wrapper" class="scroll-list">
                        <div id="listP_pend"></div>
                        <div id="listP_conf" class="mt-4 border-t border-dashed border-slate-200 pt-3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCi8znMRngui3EI6tODeuczGcUV2o3U90c",
        authDomain: "financeiro-guilherme-49a5b.firebaseapp.com",
        projectId: "financeiro-guilherme-49a5b",
        storageBucket: "financeiro-guilherme-49a5b.firebasestorage.app",
        messagingSenderId: "61246912262",
        appId: "1:61246912262:web:75273e5394d837e6e69087"
    };

    const app = initializeApp(firebaseConfig);
    const db_fire = getFirestore(app);
    let db = {}, currentFilter = 'all';

    const formatBRL = (v) => Number(v || 0).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    const parseBRL = (t) => parseFloat(String(t || '').replace(/[R$\s.]/g, '').replace(',', '.')) || 0;

    async function init() {
        const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const mS = document.getElementById('f_mes'), aS = document.getElementById('f_ano'), n = new Date();
        meses.forEach((m, i) => mS.innerHTML += `<option value="${i}">${m}</option>`);
        for (let y = n.getFullYear() + 1; y >= 2024; y--) aS.innerHTML += `<option value="${y}">${y}</option>`;
        mS.value = n.getMonth(); aS.value = n.getFullYear();
        mS.onchange = render; aS.onchange = render;
        
        document.getElementById('f_valor').oninput = function() {
            let v = this.value.replace(/\D/g, ''); v = (v/100).toFixed(2).replace('.', ',');
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, '$1.$2.$3,').replace(/(\d)(\d{3}),/g, '$1.$2,');
            this.value = v === '0,00' ? '' : 'R$ ' + v;
        };

        document.getElementById('btnAddR').onclick = () => add('R');
        document.getElementById('btnAddP').onclick = () => add('P');
        
        onSnapshot(collection(db_fire, "financeiro"), (s) => {
            s.forEach(d => db[d.id] = d.data());
            render();
        });
    }

    window.ajustarSaldo = async (campo) => {
        const novoV = prompt("Digite o saldo inicial real desta conta:");
        if (novoV === null) return;
        const valorNum = parseFloat(novoV.replace(',', '.')) || 0;
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if (!db[key]) db[key] = { R: [], P: [], initBanco: 0, initVivo: 0 };
        db[key][campo] = valorNum;
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
    };

    window.setFilter = (f) => {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-f-${f}`).classList.add('active');
        render();
    };

    function render() {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if (!db[key]) db[key] = { R: [], P: [], initBanco: 0, initVivo: 0 };
        const data = db[key];
        
        ['listR_pend', 'listR_conf', 'listP_pend', 'listP_conf'].forEach(id => document.getElementById(id).innerHTML = '');
        
        let tR = 0, tP = 0, sInter = Number(data.initBanco || 0), sVivo = Number(data.initVivo || 0);

        const row = (it, type) => `
            <div class="card-item flex items-center justify-between ${it.ok ? 'done' : ''}">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black text-slate-400 w-5">${String(it.dia).padStart(2,'0')}</span>
                    <div>
                        <p class="text-[11px] font-bold text-slate-700 uppercase mb-1">${it.desc}</p>
                        <span class="text-[8px] font-black px-1.5 py-0.5 rounded ${it.conta==='banco'?'bg-blue-50 text-blue-500':'bg-emerald-50 text-emerald-500'} uppercase">${it.conta === 'banco' ? 'Inter' : 'Vivo'}</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-[11px] font-black ${type==='R'?'text-emerald-600':'text-rose-600'}">${formatBRL(it.valor)}</span>
                    <input type="checkbox" ${it.ok?'checked':''} onchange="window.tk('${type}', ${it.id})" class="w-4 h-4 accent-blue-600 cursor-pointer">
                    <button onclick="window.del('${type}', ${it.id})" class="text-slate-200 hover:text-rose-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                </div>
            </div>`;

        data.R.forEach(it => {
            tR += Number(it.valor);
            if(it.ok) (it.conta==='banco' ? sInter += Number(it.valor) : sVivo += Number(it.valor));
            if(currentFilter === 'all' || it.conta === currentFilter) 
                document.getElementById(it.ok ? 'listR_conf' : 'listR_pend').innerHTML += row(it, 'R');
        });

        data.P.forEach(it => {
            tP += Number(it.valor);
            if(it.ok) (it.conta==='banco' ? sInter -= Number(it.valor) : sVivo -= Number(it.valor));
            if(currentFilter === 'all' || it.conta === currentFilter) 
                document.getElementById(it.ok ? 'listP_conf' : 'listP_pend').innerHTML += row(it, 'P');
        });

        document.getElementById('totalR').innerText = formatBRL(tR);
        document.getElementById('totalP').innerText = formatBRL(tP);
        document.getElementById('labelBanco').innerText = formatBRL(sInter);
        document.getElementById('labelVivo').innerText = formatBRL(sVivo);
        
        const projetadoFinal = (Number(data.initBanco || 0) + Number(data.initVivo || 0) + tR) - tP;
        document.getElementById('totalSaldo').innerText = formatBRL(projetadoFinal);
        
        lucide.createIcons();
    }

    async function add(type) {
        const d = document.getElementById('f_desc').value.toUpperCase(), v = parseBRL(document.getElementById('f_valor').value), dia = parseInt(document.getElementById('f_dia').value) || 1, key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if(!d || v <= 0) return;
        if (!db[key]) db[key] = { R: [], P: [], initBanco: 0, initVivo: 0 };
        db[key][type].push({ id: Date.now(), dia, desc: d, valor: v, ok: false, conta: document.getElementById('f_conta').value });
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
        document.getElementById('f_desc').value = ''; document.getElementById('f_valor').value = '';
    }

    window.tk = async (type, id) => {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const it = db[key][type].find(x=>x.id===id); it.ok = !it.ok;
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
    };

    window.del = async (type, id) => {
        if(!confirm("Excluir?")) return;
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        db[key][type] = db[key][type].filter(x=>x.id!==id);
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
    };

    init();
</script>
</body>
</html>
