<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Pro v23 - Compact Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F1F5F9; --primary: #0F172A; --accent: #2563EB; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #1E293B; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .glass-card { background: white; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border-radius: 1rem; }
        input[type="checkbox"] { appearance: none; width: 16px; height: 16px; border: 2px solid #CBD5E1; border-radius: 4px; cursor: pointer; position: relative; transition: all 0.2s; }
        input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
        input[type="checkbox"]:checked::after { content: '✓'; position: absolute; color: white; font-size: 10px; left: 2.5px; top: -1px; }
        .negative-val { color: #E11D48 !important; }
        .loading-dot { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-2 md:px-6 md:py-3">

<div id="appContainer" class="max-w-[1600px] mx-auto flex flex-col gap-3">
    
    <!-- HEADER SLIM -->
    <header class="flex items-center justify-between no-print">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center shadow-lg">
                <i data-lucide="zap" class="w-4 h-4 text-blue-400"></i>
            </div>
            <div>
                <h1 class="text-base font-black tracking-tighter text-slate-800 uppercase">FINANCEIRO<span class="text-blue-600">PRO</span></h1>
                <div id="statusSync" class="text-[6px] font-black uppercase text-emerald-500 tracking-widest flex items-center gap-1">
                    <div class="w-1 h-1 rounded-full bg-emerald-500"></div> Sincronizado
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-1 bg-white p-1 rounded-lg border border-slate-200 shadow-sm scale-90 origin-right">
            <select id="f_mes" class="bg-transparent text-[11px] font-bold px-2 outline-none cursor-pointer"></select>
            <select id="f_ano" class="bg-slate-50 text-[11px] font-bold px-3 py-1 rounded-md outline-none cursor-pointer text-blue-600"></select>
        </div>
    </header>

    <!-- DASHBOARD COMPACTO -->
    <section class="grid grid-cols-2 md:grid-cols-5 gap-3" id="dashboard">
        <div class="glass-card p-3 bg-slate-900 text-white border-none">
            <span class="text-[7px] font-bold uppercase text-slate-400 block mb-1 tracking-widest">Previsão Final</span>
            <div id="totalSaldo" class="text-lg font-mono font-bold tracking-tighter">R$ 0,00</div>
        </div>
        <div class="glass-card p-3 border-l-4 border-l-blue-500">
            <span class="text-[7px] font-bold uppercase text-slate-400 block mb-1 tracking-widest">Saldo Real</span>
            <div id="realMao" class="text-lg font-mono font-bold text-slate-800">R$ 0,00</div>
        </div>
        <div class="glass-card p-3 border-l-4 border-l-emerald-500">
            <span class="text-[7px] font-bold uppercase text-emerald-500 block mb-1 tracking-widest">Entradas</span>
            <div id="totalR" class="text-lg font-mono font-bold text-slate-800">R$ 0,00</div>
        </div>
        <div class="glass-card p-3 border-l-4 border-l-rose-500">
            <span class="text-[7px] font-bold uppercase text-rose-500 block mb-1 tracking-widest">Saídas</span>
            <div id="totalP" class="text-lg font-mono font-bold text-slate-800">R$ 0,00</div>
        </div>
        <div class="glass-card p-3 border-l-4 border-l-slate-300">
            <span class="text-[7px] font-bold uppercase text-slate-400 block mb-1 tracking-widest">Inicial</span>
            <input type="text" id="f_saldo_ini" class="text-lg font-mono font-bold w-full bg-transparent outline-none text-slate-700" placeholder="R$ 0,00">
        </div>
    </section>

    <!-- BARRA DE AÇÕES SLIM -->
    <div class="flex gap-2 no-print">
        <button id="btnRelatorio" class="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-[9px] font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-blue-700 transition-all">
            <i data-lucide="bar-chart-3" class="w-3 h-3"></i> Relatório
        </button>
        <button id="btnExportExcel" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 rounded-lg text-[9px] font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-slate-50 transition-all">
            <i data-lucide="download" class="w-3 h-3"></i> Excel
        </button>
        <button id="btnImportJSON" class="px-3 py-1.5 bg-amber-50 border border-amber-100 text-amber-600 rounded-lg text-[9px] font-bold uppercase tracking-widest flex items-center gap-2">
            <i data-lucide="database" class="w-3 h-3"></i> Backup
        </button>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <main id="mainContent" class="grid grid-cols-1 lg:grid-cols-12 gap-4 items-start">
        
        <!-- SIDEBAR: FORM REDUZIDO -->
        <aside class="lg:col-span-3 no-print">
            <div class="glass-card p-4 space-y-3">
                <h3 class="text-[9px] font-black uppercase text-slate-400 tracking-widest border-b pb-1">Novo Lançamento</h3>
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="f_dia" placeholder="Dia" class="w-full p-2 bg-slate-50 rounded-lg text-xs font-mono outline-none focus:ring-1 ring-blue-100">
                    <input type="number" id="f_parc" placeholder="Parc." value="1" class="w-full p-2 bg-slate-50 rounded-lg text-xs font-mono outline-none focus:ring-1 ring-blue-100">
                </div>

                <input type="text" id="f_desc" placeholder="DESCRIÇÃO..." class="w-full p-2 bg-slate-50 rounded-lg font-bold text-xs uppercase outline-none focus:ring-1 ring-blue-100">
                
                <div class="space-y-1">
                    <input type="text" id="f_valor" placeholder="R$ 0,00" class="w-full p-2.5 bg-slate-100 rounded-xl font-mono font-bold text-xl text-center text-slate-800 outline-none">
                </div>

                <div class="grid grid-cols-1 gap-1.5 pt-1">
                    <button id="btnAddR" class="bg-emerald-500 text-white py-2.5 rounded-xl font-black text-[9px] uppercase hover:bg-emerald-600 transition-all shadow-md shadow-emerald-50">RECEBER</button>
                    <button id="btnAddP" class="bg-rose-500 text-white py-2.5 rounded-xl font-black text-[9px] uppercase hover:bg-rose-600 transition-all shadow-md shadow-rose-50">PAGAR</button>
                </div>
            </div>
        </aside>

        <!-- LISTAGENS COMPACTAS -->
        <div class="lg:col-span-9 grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- ENTRADAS -->
            <section class="space-y-3">
                <div class="flex items-center gap-2 border-b border-emerald-100 pb-1">
                    <div class="w-1.5 h-4 bg-emerald-500 rounded-full"></div>
                    <h4 class="text-[10px] font-black text-slate-800 uppercase tracking-widest">Entradas</h4>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <span class="text-[8px] font-bold text-slate-400 uppercase mb-1.5 block tracking-tighter">A Receber</span>
                        <div id="listR_pend" class="space-y-1"></div>
                    </div>
                    <div class="pt-2 border-t border-slate-50">
                        <span class="text-[8px] font-bold text-emerald-500 uppercase mb-1.5 block tracking-tighter">Confirmadas</span>
                        <div id="listR_conf" class="space-y-1 opacity-70 italic"></div>
                    </div>
                </div>
            </section>

            <!-- SAÍDAS -->
            <section class="space-y-3">
                <div class="flex items-center gap-2 border-b border-rose-100 pb-1">
                    <div class="w-1.5 h-4 bg-rose-500 rounded-full"></div>
                    <h4 class="text-[10px] font-black text-slate-800 uppercase tracking-widest">Saídas</h4>
                </div>

                <div class="space-y-4">
                    <div>
                        <span class="text-[8px] font-bold text-slate-400 uppercase mb-1.5 block tracking-tighter">A Pagar</span>
                        <div id="listP_pend" class="space-y-1"></div>
                    </div>
                    <div class="pt-2 border-t border-slate-50">
                        <span class="text-[8px] font-bold text-rose-500 uppercase mb-1.5 block tracking-tighter">Quitadas</span>
                        <div id="listP_conf" class="space-y-1 opacity-70 italic"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- RELATÓRIO ANUAL (HIDDEN) -->
    <section id="sectionAnual" class="hidden glass-card p-6 border-2 border-blue-50">
        <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
            <h2 class="text-xl font-bold">Relatório <span id="labelAnoReport" class="text-blue-600"></span></h2>
            <button id="btnCloseAnual" class="p-1.5 bg-slate-100 rounded-lg hover:bg-rose-50 hover:text-rose-600 transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead><tr class="text-[9px] uppercase text-slate-400 border-b font-black"><th class="pb-2">Mês</th><th class="pb-2">Entradas</th><th class="pb-2">Saídas</th><th class="pb-2">Saldo</th><th class="pb-2 text-right">Ação</th></tr></thead>
                <tbody id="bodyRelatorioAnual" class="text-[11px] font-semibold text-slate-600"></tbody>
            </table>
        </div>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCi8znMRngui3EI6tODeuczGcUV2o3U90c",
        authDomain: "financeiro-guilherme-49a5b.firebaseapp.com",
        projectId: "financeiro-guilherme-49a5b",
        storageBucket: "financeiro-guilherme-49a5b.firebasestorage.app",
        messagingSenderId: "61246912262",
        appId: "1:61246912262:web:75273e5394d837e6e69087"
    };

    const app = initializeApp(firebaseConfig);
    const db_fire = getFirestore(app);
    let db = {};
    const mesesNomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    function applyMoneyMask(input) {
        let v = input.value.replace(/\D/g, '');
        v = (v / 100).toFixed(2) + ''; v = v.replace('.', ',');
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, '$1.$2.$3,'); v = v.replace(/(\d)(\d{3}),/g, '$1.$2,');
        input.value = v === 'NaN' ? '' : 'R$ ' + v;
    }

    async function init() {
        lucide.createIcons(); setupSelectors(); await loadData(); render(); verificarBackupAutomatico();
    }

    function setupSelectors() {
        const mSel = document.getElementById('f_mes'), aSel = document.getElementById('f_ano');
        mesesNomes.forEach((m, i) => { const o = document.createElement('option'); o.value = i; o.textContent = m; mSel.appendChild(o); });
        const now = new Date();
        for (let y = now.getFullYear() + 5; y >= 2023; y--) { const o = document.createElement('option'); o.value = y; o.textContent = y; aSel.appendChild(o); }
        mSel.value = now.getMonth(); aSel.value = now.getFullYear();
        mSel.onchange = render; aSel.onchange = render;
    }

    async function loadData() {
        try { 
            const snap = await getDocs(collection(db_fire, "financeiro")); snap.forEach(d => db[d.id] = d.data()); 
            document.getElementById('statusSync').innerHTML = `<div class="w-1 h-1 rounded-full bg-emerald-500"></div> Sincronizado`;
        } catch (e) { console.error(e); }
    }

    async function sync(id) { 
        if (!db[id]) return;
        document.getElementById('statusSync').innerHTML = `<div class="w-1 h-1 rounded-full bg-blue-500 loading-dot"></div> Salvando...`;
        try { await setDoc(doc(db_fire, "financeiro", id), db[id]); document.getElementById('statusSync').innerHTML = `<div class="w-1 h-1 rounded-full bg-emerald-500"></div> Sincronizado`; } 
        catch (e) { document.getElementById('statusSync').innerText = "Erro"; }
    }

    function render() {
        const id = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if (!db[id]) db[id] = { R: [], P: [], saldoIni: 0 };
        const data = db[id];

        document.getElementById('f_saldo_ini').value = data.saldoIni ? data.saldoIni.toLocaleString('pt-br', {style:'currency', currency:'BRL'}) : '';
        
        const lists = { Rp: document.getElementById('listR_pend'), Rc: document.getElementById('listR_conf'), Pp: document.getElementById('listP_pend'), Pc: document.getElementById('listP_conf') };
        Object.values(lists).forEach(l => l.innerHTML = '');

        let tR = 0, tP = 0, rR = 0, rP = 0;

        const createRow = (item, type) => {
            const isR = type === 'R';
            const html = `
                <div class="flex items-center gap-2 p-1.5 bg-white border border-slate-50 rounded-lg shadow-sm group hover:border-blue-100 transition-all">
                    <input type="checkbox" ${item.ok ? 'checked' : ''} onchange="toggleItem('${type}', ${item.id})">
                    <span class="text-[8px] font-mono font-bold text-slate-400 bg-slate-50 px-1 rounded">${String(item.dia).padStart(2,'0')}</span>
                    <span class="flex-1 text-[10px] font-bold text-slate-700 truncate ${item.ok ? 'line-through opacity-40' : ''}">${item.desc}</span>
                    <span class="text-[10px] font-mono font-bold ${isR ? 'text-emerald-600' : 'text-rose-600'}">${item.valor.toFixed(2)}</span>
                    <button onclick="delItem('${type}', ${item.id}, '${item.desc}')" class="opacity-0 group-hover:opacity-100 text-slate-200 hover:text-rose-500 transition-all"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>`;
            if (isR) { tR += item.valor; if(item.ok) { rR += item.valor; lists.Rc.innerHTML += html; } else { lists.Rp.innerHTML += html; } }
            else { tP += item.valor; if(item.ok) { rP += item.valor; lists.Pc.innerHTML += html; } else { lists.Pp.innerHTML += html; } }
        };

        data.R.sort((a,b)=>a.dia - b.dia).forEach(i => createRow(i, 'R'));
        data.P.sort((a,b)=>a.dia - b.dia).forEach(i => createRow(i, 'P'));

        const totalSaldo = data.saldoIni + tR - tP;
        const totalSaldoEl = document.getElementById('totalSaldo');
        
        document.getElementById('totalR').innerText = tR.toLocaleString('pt-br', {style:'currency', currency:'BRL'});
        document.getElementById('totalP').innerText = tP.toLocaleString('pt-br', {style:'currency', currency:'BRL'});
        totalSaldoEl.innerText = totalSaldo.toLocaleString('pt-br', {style:'currency', currency:'BRL'});
        totalSaldoEl.className = `text-lg font-mono font-bold tracking-tighter ${totalSaldo < 0 ? 'negative-val' : 'text-white'}`;
        
        document.getElementById('realMao').innerText = (data.saldoIni + rR - rP).toLocaleString('pt-br', {style:'currency', currency:'BRL'});
        lucide.createIcons();
    }

    document.getElementById('f_valor').oninput = (e) => applyMoneyMask(e.target);
    document.getElementById('f_saldo_ini').oninput = (e) => applyMoneyMask(e.target);
    
    document.getElementById('f_saldo_ini').onblur = async (e) => {
        const id = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        db[id].saldoIni = parseFloat(e.target.value.replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
        render(); sync(id);
    };

    window.toggleItem = async (type, itemId) => {
        const id = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const item = db[id][type].find(i => i.id == itemId); if (item) item.ok = !item.ok;
        render(); sync(id);
    };

    window.delItem = async (type, itemId, desc) => {
        const id = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const match = desc.match(/(.+)\s\(\d+\/\d+\)$/);
        if (match && confirm(`Apagar TODAS as parcelas de "${match[1]}"?`)) {
            Object.keys(db).forEach(k => { if(db[k]) { db[k][type] = db[k][type].filter(i => !i.desc.startsWith(match[1])); sync(k); } });
        } else if (confirm("Excluir?")) { db[id][type] = db[id][type].filter(i => i.id != itemId); sync(id); }
        render();
    };

    const addItem = async (type) => {
        const desc = document.getElementById('f_desc').value.trim().toUpperCase(), valor = parseFloat(document.getElementById('f_valor').value.replace(/[R$\s.]/g, '').replace(',', '.')) || 0, dia = parseInt(document.getElementById('f_dia').value) || new Date().getDate(), parc = parseInt(document.getElementById('f_parc').value) || 1;
        if(!desc || valor <= 0) return;
        let m = parseInt(document.getElementById('f_mes').value), a = parseInt(document.getElementById('f_ano').value);
        for (let i = 0; i < parc; i++) {
            const mesId = `${m}_${a}`; if(!db[mesId]) db[mesId] = { R: [], P: [], saldoIni: 0 };
            db[mesId][type].push({ id: Date.now() + i + Math.random(), dia, desc: parc > 1 ? `${desc} (${i+1}/${parc})` : desc, valor, ok: false });
            sync(mesId); m++; if(m > 11) { m = 0; a++; }
        }
        document.getElementById('f_desc').value = ''; document.getElementById('f_valor').value = ''; render();
    };

    document.getElementById('btnAddR').onclick = () => addItem('R');
    document.getElementById('btnAddP').onclick = () => addItem('P');

    function exportarCSV(f) {
        const id = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`, data = db[id];
        let csv = `Tipo;Dia;Descricao;Valor;Status\n`;
        data.R.forEach(i => csv += `Entrada;${i.dia};${i.desc};${i.valor};${i.ok?'OK':'PEND'}\n`);
        data.P.forEach(i => csv += `Saida;${i.dia};${i.desc};${i.valor};${i.ok?'OK':'PEND'}\n`);
        const b = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = (f || `Financeiro_${id}`) + ".csv"; l.click();
    }

    function verificarBackupAutomatico() {
        const h = new Date().toLocaleDateString('pt-br').replace(/\//g, '-');
        if (localStorage.getItem('last_backup_v16') !== h) { setTimeout(() => { exportarCSV(`AUTO_BACKUP_${h}`); localStorage.setItem('last_backup_v16', h); }, 5000); }
    }

    document.getElementById('btnExportExcel').onclick = () => exportarCSV();
    document.getElementById('btnImportJSON').onclick = () => {
        const i = document.createElement('input'); i.type = 'file'; i.accept = '.json';
        i.onchange = e => {
            const r = new FileReader(); r.onload = async ev => {
                const imp = JSON.parse(ev.target.result);
                if(confirm("Substituir tudo?")) { for(const [k, v] of Object.entries(imp)) { db[k] = v; await setDoc(doc(db_fire, "financeiro", k), v); } render(); }
            }; r.readAsText(e.target.files[0]);
        }; i.click();
    };

    document.getElementById('btnRelatorio').onclick = () => {
        const ano = document.getElementById('f_ano').value; document.getElementById('labelAnoReport').innerText = ano;
        const body = document.getElementById('bodyRelatorioAnual'); body.innerHTML = '';
        for(let m=0; m<12; m++){
            const d = db[`${m}_${ano}`] || { R:[], P:[], saldoIni:0 }; const ent = d.R.reduce((a,b)=>a+b.valor,0), sai = d.P.reduce((a,b)=>a+b.valor,0);
            body.innerHTML += `<tr class="hover:bg-slate-50 transition-all border-b border-slate-50"><td class="py-2 font-bold text-slate-800">${mesesNomes[m]}</td><td class="text-emerald-600">R$ ${ent.toFixed(2)}</td><td class="text-rose-600">R$ ${sai.toFixed(2)}</td><td class="font-bold text-slate-700">R$ ${(ent-sai).toFixed(2)}</td><td class="text-right"><button onclick="window.irParaMes(${m})" class="bg-blue-600 text-white px-3 py-1 rounded-md text-[9px] font-black uppercase shadow-sm">Ver</button></td></tr>`;
        }
        document.getElementById('mainContent').classList.add('hidden'); document.getElementById('dashboard').classList.add('hidden'); document.getElementById('sectionAnual').classList.remove('hidden');
    };

    window.irParaMes = (m) => { document.getElementById('f_mes').value = m; document.getElementById('btnCloseAnual').click(); render(); };
    document.getElementById('btnCloseAnual').onclick = () => { document.getElementById('mainContent').classList.remove('hidden'); document.getElementById('dashboard').classList.remove('hidden'); document.getElementById('sectionAnual').classList.add('hidden'); };

    init();
</script>
</body>
</html>
