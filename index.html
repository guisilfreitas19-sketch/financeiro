<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Financeiro Deep v32.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
        }

        /* Sidebar Escura mas não "Black" */
        .sidebar-premium {
            background: #0f172a; /* Azul Marinho Profundo */
            color: white;
            border-radius: 24px;
        }

        .card-entry {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-entry:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        /* Inputs dentro da área escura */
        .input-deep {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            padding: 12px;
            font-weight: 600;
        }
        .input-deep:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
            outline: none;
        }

        .badge-date {
            background: #f1f5f9;
            color: #0f172a;
            font-family: 'JetBrains Mono', monospace;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 800;
        }

        .header-glass {
            background: #ffffff;
            border-bottom: 2px solid #e2e8f0;
        }

        .btn-main {
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }

        .item-done { opacity: 0.5; filter: grayscale(0.5); }
    </style>
</head>
<body class="min-h-screen">

    <header class="header-glass p-5 mb-8">
        <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl">
                    <i data-lucide="bar-chart-big" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Dash<span class="text-blue-600">Pro</span></h1>
            </div>
            
            <div class="flex items-center gap-4 bg-slate-50 p-1.5 rounded-2xl border border-slate-200">
                <select id="f_mes" class="bg-transparent font-bold px-3 py-1 outline-none text-slate-600"></select>
                <select id="f_ano" class="bg-blue-600 text-white font-black px-6 py-2 rounded-xl outline-none shadow-lg shadow-blue-100"></select>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-4 md:p-0">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <aside class="lg:col-span-4">
                <div class="sidebar-premium p-8 shadow-2xl sticky top-8">
                    <h2 class="text-lg font-black mb-8 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="text-blue-400"></i> LANÇAMENTO
                    </h2>
                    
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Dia do Mês</label>
                                <input type="number" id="f_dia" class="input-deep w-full text-center" placeholder="00">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Parcelas</label>
                                <input type="number" id="f_parc" value="1" class="input-deep w-full text-center">
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">O que é isso?</label>
                            <input type="text" id="f_desc" class="input-deep w-full uppercase" placeholder="DESCRIÇÃO">
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Onde está o dinheiro?</label>
                            <select id="f_conta" class="input-deep w-full">
                                <option value="banco">🏦 BANCO INTER</option>
                                <option value="caixa">💵 EM MÃO (DINHEIRO)</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Quanto? (Valor)</label>
                            <input type="text" id="f_valor" class="input-deep w-full text-2xl font-black text-center text-blue-400" placeholder="R$ 0,00">
                        </div>

                        <div class="grid grid-cols-2 gap-4 pt-4">
                            <button id="btnAddR" class="btn-main bg-blue-600 hover:bg-blue-500 text-white p-4 shadow-lg shadow-blue-900/20">GANHO (+)</button>
                            <button id="btnAddP" class="btn-main bg-slate-700 hover:bg-slate-600 text-white p-4">GASTO (-)</button>
                        </div>
                    </div>

                    <div class="mt-10 pt-8 border-t border-slate-800">
                        <p class="text-[10px] font-black text-slate-500 uppercase mb-4">Resumo rápido</p>
                        <div class="flex justify-between mb-2">
                            <span class="text-xs text-slate-400">Previsão:</span>
                            <span id="totalSaldo" class="text-xs font-bold text-white">R$ 0,00</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-xs text-slate-400">Confirmado:</span>
                            <span id="realMao" class="text-xs font-bold text-blue-400">R$ 0,00</span>
                        </div>
                    </div>
                </div>
            </aside>

            <div class="lg:col-span-8 space-y-12">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-2xl border-l-8 border-emerald-500 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Receitas Totais</p>
                        <h3 id="totalR" class="text-2xl font-black text-emerald-600 mt-1">R$ 0,00</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border-l-8 border-rose-500 shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Despesas Totais</p>
                        <h3 id="totalP" class="text-2xl font-black text-rose-600 mt-1">R$ 0,00</h3>
                    </div>
                </div>

                <section>
                    <h2 class="text-xs font-black uppercase tracking-[3px] text-slate-400 mb-6 flex items-center gap-2">
                        <span class="p-1 bg-emerald-100 text-emerald-600 rounded"> <i data-lucide="trending-up" class="w-3 h-3"></i> </span> 
                        Entradas
                    </h2>
                    <div id="listR_pend" class="space-y-3"></div>
                    <div id="listR_conf" class="mt-4 space-y-2 opacity-60"></div>
                </section>

                <section>
                    <h2 class="text-xs font-black uppercase tracking-[3px] text-slate-400 mb-6 flex items-center gap-2">
                        <span class="p-1 bg-rose-100 text-rose-600 rounded"> <i data-lucide="trending-down" class="w-3 h-3"></i> </span> 
                        Saídas
                    </h2>
                    <div id="listP_pend" class="space-y-3"></div>
                    <div id="listP_conf" class="mt-4 space-y-2 opacity-60"></div>
                </section>

            </div>
        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCi8znMRngui3EI6tODeuczGcUV2o3U90c",
        authDomain: "financeiro-guilherme-49a5b.firebaseapp.com",
        projectId: "financeiro-guilherme-49a5b",
        storageBucket: "financeiro-guilherme-49a5b.firebasestorage.app",
        messagingSenderId: "61246912262",
        appId: "1:61246912262:web:75273e5394d837e6e69087"
    };

    const app = initializeApp(firebaseConfig);
    const db_fire = getFirestore(app);
    let db = {};

    const formatBRL = (v) => Number(v || 0).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    const parseBRL = (t) => parseFloat(String(t || '').replace(/[R$\s.]/g, '').replace(',', '.')) || 0;

    function mask(i) {
        let v = i.value.replace(/\D/g, '');
        v = (v/100).toFixed(2).replace('.', ',');
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, '$1.$2.$3,').replace(/(\d)(\d{3}),/g, '$1.$2,');
        i.value = v === '0,00' ? '' : 'R$ ' + v;
    }

    async function init() {
        const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        const mS = document.getElementById('f_mes');
        const aS = document.getElementById('f_ano');
        const n = new Date();
        meses.forEach((m, i) => mS.innerHTML += `<option value="${i}">${m.toUpperCase()}</option>`);
        for (let y = n.getFullYear() + 1; y >= 2024; y--) aS.innerHTML += `<option value="${y}">${y}</option>`;
        mS.value = n.getMonth(); aS.value = n.getFullYear();
        mS.onchange = render; aS.onchange = render;
        
        document.getElementById('f_valor').oninput = (e) => mask(e.target);
        document.getElementById('btnAddR').onclick = () => add('R');
        document.getElementById('btnAddP').onclick = () => add('P');

        const s = await getDocs(collection(db_fire, "financeiro"));
        s.forEach(d => db[d.id] = d.data());
        render();
    }

    function render() {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if (!db[key]) db[key] = { R: [], P: [], saldoIniCaixa: 0, saldoIniBanco: 0 };
        const data = db[key];

        const ids = ['listR_pend', 'listR_conf', 'listP_pend', 'listP_conf'];
        ids.forEach(id => document.getElementById(id).innerHTML = '');

        let tr=0, tp=0, sc=0, sb=0;

        const card = (it, type) => `
            <div class="card-entry flex items-center justify-between p-4 ${it.ok ? 'item-done' : ''}">
                <div class="flex items-center gap-4">
                    <span class="badge-date">${String(it.dia).padStart(2,'0')}</span>
                    <div>
                        <p class="text-[13px] font-extrabold uppercase text-slate-700">${it.desc}</p>
                        <p class="text-[9px] font-black text-blue-500 uppercase">${it.conta}</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span class="font-bold ${type==='R'?'text-emerald-600':'text-rose-600'}">${formatBRL(it.valor)}</span>
                    <input type="checkbox" ${it.ok?'checked':''} onchange="window.tk('${type}', ${it.id})" class="w-5 h-5 accent-blue-600 cursor-pointer">
                    <button onclick="window.del('${type}', ${it.id})" class="text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>
        `;

        data.R.sort((a,b)=>a.dia-b.dia).forEach(it => {
            tr += it.valor; if(it.ok) (it.conta==='caixa'?sc+=it.valor:sb+=it.valor);
            document.getElementById(it.ok?'listR_conf':'listR_pend').innerHTML += card(it, 'R');
        });
        data.P.sort((a,b)=>a.dia-b.dia).forEach(it => {
            tp += it.valor; if(it.ok) (it.conta==='caixa'?sc-=it.valor:sb-=it.valor);
            document.getElementById(it.ok?'listP_conf':'listP_pend').innerHTML += card(it, 'P');
        });

        document.getElementById('totalR').innerText = formatBRL(tr);
        document.getElementById('totalP').innerText = formatBRL(tp);
        document.getElementById('totalSaldo').innerText = formatBRL(tr - tp);
        document.getElementById('realMao').innerText = formatBRL(sc+sb);
        lucide.createIcons();
    }

    async function add(type) {
        const d = document.getElementById('f_desc').value.toUpperCase();
        const v = parseBRL(document.getElementById('f_valor').value);
        const dia = parseInt(document.getElementById('f_dia').value) || 1;
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if(!d || v <= 0) return;
        db[key][type].push({ id: Date.now(), dia, desc: d, valor: v, ok: false, conta: document.getElementById('f_conta').value });
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
        render();
    }

    window.tk = async (type, id) => {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const it = db[key][type].find(x=>x.id===id);
        it.ok = !it.ok;
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
        render();
    };

    window.del = async (type, id) => {
        if(!confirm("Excluir?")) return;
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        db[key][type] = db[key][type].filter(x=>x.id!==id);
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
        render();
    };

    init();
</script>
</body>
</html>
