<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Mensal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { height: 100vh; background-color: #f8fafc; font-family: sans-serif; overflow: hidden; }
        .money-input { text-align: right; }
        .item-pago { opacity: 0.4; text-decoration: line-through; filter: grayscale(1); }
        
        /* Ajuste de clique: garante que o botão responda */
        button { cursor: pointer !important; position: relative; z-index: 50; }
        input { position: relative; z-index: 50; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; overflow: visible; height: auto; }
            .print-area { grid-column: span 12 / span 12 !important; display: block !important; }
            .card-container { border: 1px solid #ddd !important; margin-bottom: 20px; box-shadow: none !important; }
            .print-footer { display: block !important; position: fixed; bottom: 0; width: 100%; text-align: center; font-size: 10px; color: #666; }
        }
        .print-footer { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-[1400px] mx-auto h-full flex flex-col gap-4">
        
        <div class="grid grid-cols-4 gap-4 h-24 shrink-0">
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center">
                <span class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Total Entradas</span>
                <span id="totalReceber" class="text-2xl font-black text-green-600 font-mono">R$ 0,00</span>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center">
                <span class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">Total Saídas</span>
                <span id="totalPagar" class="text-2xl font-black text-red-600 font-mono">R$ 0,00</span>
            </div>
            <div id="cardSaldo" class="p-4 rounded-xl shadow-md flex flex-col justify-center transition-colors duration-500 bg-blue-600">
                <span class="text-[10px] opacity-80 uppercase font-bold tracking-wider text-white">Saldo Previsto</span>
                <span id="saldoGeral" class="text-2xl font-black text-white font-mono">R$ 0,00</span>
            </div>
            <div class="no-print flex flex-col gap-2 justify-center">
                <button onclick="window.print()" class="bg-gray-800 text-white font-bold py-2 rounded-lg text-[10px] uppercase hover:bg-black transition-all active:scale-95">🖨️ Gerar Relatório</button>
                <button onclick="limparMes()" class="bg-white border border-red-100 text-red-400 font-bold py-2 rounded-lg text-[10px] uppercase hover:bg-red-50 transition-all active:scale-95">🗑️ Resetar Mês</button>
            </div>
        </div>

        <div class="flex-1 grid grid-cols-12 gap-4 overflow-hidden min-h-0">
            
            <div class="col-span-3 bg-white p-6 rounded-xl border border-gray-200 shadow-sm no-print relative z-10">
                <h2 class="font-bold text-gray-700 mb-6 border-b pb-2 text-xs uppercase tracking-widest">Novo Registro</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-4 gap-2">
                        <div class="col-span-1">
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase text-center">Dia</label>
                            <input type="number" id="dia" min="1" max="31" class="w-full border-b-2 border-gray-100 p-2 text-center focus:border-blue-500 outline-none text-sm font-bold bg-gray-50 rounded">
                        </div>
                        <div class="col-span-3">
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Descrição</label>
                            <input type="text" id="desc" class="w-full border-b-2 border-gray-100 p-2 focus:border-blue-500 outline-none text-sm font-medium uppercase bg-gray-50 rounded">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Valor</label>
                        <input type="text" id="valor" oninput="mascaraMoeda(this)" placeholder="R$ 0,00" class="money-input w-full border-b-2 border-gray-100 p-2 focus:border-blue-500 outline-none font-mono font-bold text-blue-700 text-xl bg-gray-50 rounded">
                    </div>
                    <div class="flex gap-2 pt-4">
                        <button onclick="adicionar('receber')" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl text-xs uppercase shadow-md active:translate-y-1 transition-all">Receber</button>
                        <button onclick="adicionar('pagar')" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-black py-4 rounded-xl text-xs uppercase shadow-md active:translate-y-1 transition-all">Pagar</button>
                    </div>
                </div>
            </div>

            <div class="print-area col-span-9 grid grid-cols-2 gap-4 overflow-hidden h-full">
                <div class="card-container bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col overflow-hidden">
                    <div class="p-3 bg-green-50 border-b border-green-100 font-black text-green-700 text-[10px] uppercase">Lançamentos de Entrada</div>
                    <div id="listaReceber" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
                </div>
                <div class="card-container bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col overflow-hidden">
                    <div class="p-3 bg-red-50 border-b border-red-100 font-black text-red-700 text-[10px] uppercase">Contas a Pagar</div>
                    <div id="listaPagar" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="print-footer">Relatório Mensal - <span id="dataPrint"></span></div>
