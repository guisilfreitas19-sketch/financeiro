<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soitic v14.4 - Fix & Edit</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Liberando o scroll para baixo */
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-y: auto !important; 
            min-height: 100vh;
        }
        .italic-force { font-style: italic !important; }
        .podium-box { border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); border-radius: 2rem 2rem 0 0; }
        .management-card { background: #111; border: 1px solid #333; border-radius: 1.5rem; padding: 20px; }
        .input-label { font-size: 10px; font-weight: 900; letter-spacing: 0.1em; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .management-input { background: #000; border: 1px solid #444; color: #fff; border-radius: 10px; padding: 12px; text-align: right; width: 100%; font-weight: bold; font-family: monospace; }
        .management-input:focus { border-color: #fbbf24; outline: none; background: #0a0a0a; }
    </style>
</head>
<body class="p-4 italic-force pb-20">

    <header class="flex justify-between items-center mb-10 px-8 border-b border-white/10 pb-6">
        <h1 class="text-3xl font-black italic uppercase">Grupo <span class="text-amber-500">Soitic</span></h1>
        <div class="flex gap-4">
            <button onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})" class="bg-white/10 text-white px-4 py-2 rounded-full text-[10px] uppercase">Ir para Lançamentos</button>
            <button onclick="document.getElementById('management-section').classList.toggle('hidden')" class="bg-amber-500 text-black font-black px-6 py-2 rounded-full text-[10px] uppercase">Lançar Dados</button>
        </div>
    </header>

    <main class="max-w-[1800px] mx-auto">
        <div class="grid lg:grid-cols-2 gap-10" id="podiums-container"></div>

        <section id="management-section" class="mt-20 bg-zinc-900/80 p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
            <h2 class="text-xs font-black text-slate-500 mb-8 uppercase tracking-widest text-center">Painel de Lançamento e Edição</h2>
            <div id="sellers-list" class="grid md:grid-cols-2 lg:grid-cols-2 gap-6"></div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDXIjm1BOM-8dO85elFdl-CL9y80e-UaSQ",
            authDomain: "podio-comercia.firebaseapp.com",
            projectId: "podio-comercia",
            storageBucket: "podio-comercia.firebasestorage.app",
            messagingSenderId: "973336659250",
            appId: "1:973336659250:web:5f16eb4015289837a9c32b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { sellers: [] };

        function formatCurrency(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);
        }

        // Carregar dados iniciais e escutar mudanças
        db.ref('dashboard_v12').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state = data;
                // Só redesenha os inputs se o usuário NÃO estiver editando agora
                if (!document.activeElement.classList.contains('management-input')) {
                    renderManagement();
                }
                renderPodiums();
            }
        });

        function renderManagement() {
            const list = document.getElementById('sellers-list');
            list.innerHTML = state.sellers.map(s => `
                <div class="management-card">
                    <p class="font-black text-white mb-5 uppercase italic text-lg border-b border-white/5 pb-2">${s.name}</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <span class="input-label text-emerald-500">Vendas (R$)</span>
                            <input type="text" 
                                   value="${formatCurrency(s.sales)}" 
                                   onfocus="this.select()"
                                   oninput="maskOnly(this)"
                                   onblur="saveToFirebase(${s.id}, 'sales', this.value)"
                                   onkeydown="if(event.key==='Enter') this.blur()"
                                   class="management-input">
                        </div>
                        <div>
                            <span class="input-label text-blue-500">Contratos (#)</span>
                            <input type="text" 
                                   value="${formatCurrency(s.contracts || 0)}" 
                                   onfocus="this.select()"
                                   oninput="maskOnly(this)"
                                   onblur="saveToFirebase(${s.id}, 'contracts', this.value)"
                                   onkeydown="if(event.key==='Enter') this.blur()"
                                   class="management-input">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Apenas aplica a máscara visual enquanto digita
        function maskOnly(el) {
            let val = el.value.replace(/\D/g, "");
            el.value = formatCurrency(parseFloat(val / 100));
        }

        // Salva de fato no Firebase apenas quando sai do campo ou aperta Enter
        function saveToFirebase(id, field, rawValue) {
            let numericVal = parseFloat(rawValue.replace(/\D/g, "") / 100);
            const seller = state.sellers.find(s => s.id === id);
            
            if (seller) {
                seller[field] = numericVal;
                db.ref('dashboard_v12').set(state).then(() => {
                    console.log("Salvo com sucesso");
                });
            }
        }

        function renderPodiums() {
            const container = document.getElementById('podiums-container');
            const sortedSales = [...state.sellers].sort((a, b) => b.sales - a.sales);
            const sortedContracts = [...state.sellers].sort((a, b) => (b.contracts || 0) - (a.contracts || 0));

            container.innerHTML = `
                ${createPodiumHtml("RANKING VENDAS", sortedSales, 'sales', 'bg-emerald-600')}
                ${createPodiumHtml("CONTRATOS ACEITOS", sortedContracts, 'contracts', 'bg-blue-600')}
            `;
        }

        function createPodiumHtml(title, data, field, barClass) {
            return `
                <div class="bg-zinc-950 p-10 rounded-[3rem] border border-white/5">
                    <h2 class="text-center text-xl font-black text-slate-500 mb-16 tracking-widest uppercase italic">${title}</h2>
                    <div class="flex items-end justify-center gap-4 h-[350px]">
                        <div class="w-full text-center">
                            <span class="text-slate-400 text-sm mb-3 uppercase font-bold block">${data[1]?.name || '-'}</span>
                            <div class="podium-box h-32 flex flex-col items-center justify-center">
                                <span class="text-white/20 italic font-black">2º</span>
                                <span class="text-white text-xs mt-1 font-bold">${formatCurrency(data[1]?.[field])}</span>
                            </div>
                        </div>
                        <div class="w-full text-center">
                            <span class="text-white text-2xl font-black mb-5 uppercase italic block">${data[0]?.name || '-'}</span>
                            <div class="${barClass} h-60 rounded-t-[2rem] flex flex-col items-center justify-center transform scale-105 shadow-2xl border-t-4 border-white/20">
                                <span class="text-6xl font-black text-white italic">1º</span>
                                <div class="mt-4 bg-white text-black px-4 py-1 rounded font-black text-xs">${formatCurrency(data[0]?.[field])}</div>
                            </div>
                        </div>
                        <div class="w-full text-center">
                            <span class="text-slate-600 text-xs mb-3 uppercase font-bold block">${data[2]?.name || '-'}</span>
                            <div class="podium-box h-20 flex flex-col items-center justify-center">
                                <span class="text-white/10 italic font-black">3º</span>
                                <span class="text-slate-500 text-[10px] mt-1 font-bold">${formatCurrency(data[2]?.[field])}</span>
                            </div>
                        </div>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
