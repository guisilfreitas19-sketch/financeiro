<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Pro v12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8CC7A;
            --gold-dim: #8A6E2F;
            --bg: #0F0F12;
            --surface: #17171C;
            --surface2: #1E1E26;
            --border: #2A2A36;
            --text: #F0EEE8;
            --text-muted: #6B6878;
            --text-soft: #A09CB0;
            --green: #34D399;
            --green-dim: #064E3B;
            --red: #F87171;
            --red-dim: #4C1D1D;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 60% 50% at 70% 0%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 10% 90%, rgba(52,211,153,0.04) 0%, transparent 50%);
        }

        .font-display { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'DM Mono', monospace; }

        /* Scrollbar */
        .custom-scroll { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* Card animations */
        .item-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            animation: slideIn 0.25s ease both;
        }
        .item-card:hover { transform: translateX(3px); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .summary-card { animation: fadeIn 0.4s ease both; }
        .summary-card:nth-child(1) { animation-delay: 0s; }
        .summary-card:nth-child(2) { animation-delay: 0.06s; }
        .summary-card:nth-child(3) { animation-delay: 0.12s; }
        .summary-card:nth-child(4) { animation-delay: 0.18s; }

        /* Gold input */
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(201,168,76,0.3);
            border-color: var(--gold-dim) !important;
        }

        /* Progress bar */
        .progress-bar { transition: width 0.5s cubic-bezier(.4,0,.2,1); }

        /* Gold divider */
        .gold-line {
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            height: 1px;
        }

        /* Number glow */
        .glow-green { text-shadow: 0 0 20px rgba(52,211,153,0.4); }
        .glow-red   { text-shadow: 0 0 20px rgba(248,113,113,0.4); }
        .glow-gold  { text-shadow: 0 0 20px rgba(201,168,76,0.5); }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 80px;
            gap: 6px;
            opacity: 0.4;
        }

        /* Checkbox custom */
        input[type="checkbox"] {
            appearance: none;
            width: 16px; height: 16px;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }
        input[type="checkbox"]:checked {
            background: var(--gold);
            border-color: var(--gold);
        }
        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4px; top: 1px;
            width: 5px; height: 9px;
            border: 2px solid #000;
            border-top: 0; border-left: 0;
            transform: rotate(45deg);
        }

        /* Button pulse */
        .btn-add { transition: all 0.15s ease; }
        .btn-add:active { transform: scale(0.96); }

        /* Tooltip */
        [data-tip] { position: relative; cursor: pointer; }
        [data-tip]::after {
            content: attr(data-tip);
            position: absolute; bottom: calc(100% + 6px); left: 50%;
            transform: translateX(-50%);
            background: var(--surface2); color: var(--text-soft);
            font-size: 10px; padding: 4px 8px; border-radius: 6px;
            white-space: nowrap; pointer-events: none;
            opacity: 0; transition: opacity 0.15s ease;
            border: 1px solid var(--border);
        }
        [data-tip]:hover::after { opacity: 1; }

        /* Badge pulse when editing */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .editing-badge { animation: pulse 1.5s infinite; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
            * { color: black !important; border-color: #ccc !important; background: white !important; }
        }

        /* Divider inside barra */
        .bar-divider { border-right: 1px solid var(--border); }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 12px; }
        }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

<div class="max-w-7xl mx-auto flex flex-col gap-5">

    <!-- ─── HEADER ─── -->
    <div class="flex items-center justify-between shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg,#C9A84C,#8A6E2F);">
                <i data-lucide="bar-chart-2" class="w-4 h-4 text-black"></i>
            </div>
            <div>
                <h1 class="font-display text-lg leading-none" style="color:var(--gold)">Financeiro Pro</h1>
                <p class="text-[10px] mt-0.5" style="color:var(--text-muted)">GESTÃO PESSOAL · v12.0</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <select id="f_mes" onchange="updateData()" class="text-[11px] font-semibold px-3 py-1.5 rounded-lg border no-print"
                style="background:var(--surface);border-color:var(--border);color:var(--text-soft);">
                <option value="Jan">Janeiro</option><option value="Fev">Fevereiro</option>
                <option value="Mar">Março</option><option value="Abr">Abril</option>
                <option value="Mai">Maio</option><option value="Jun">Junho</option>
                <option value="Jul">Julho</option><option value="Ago">Agosto</option>
                <option value="Set">Setembro</option><option value="Out">Outubro</option>
                <option value="Nov">Novembro</option><option value="Dez">Dezembro</option>
            </select>
            <select id="f_ano" onchange="updateData()" class="text-[11px] font-semibold px-3 py-1.5 rounded-lg border no-print"
                style="background:var(--surface);border-color:var(--border);color:var(--text-soft);"></select>
        </div>
    </div>

    <!-- ─── CARDS RESUMO ─── -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 shrink-0">

        <!-- Saldo Inicial -->
        <div class="summary-card p-4 rounded-2xl border flex flex-col gap-2" style="background:var(--surface);border-color:var(--border);">
            <div class="flex items-center gap-2">
                <i data-lucide="wallet" class="w-3.5 h-3.5" style="color:var(--gold)"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest" style="color:var(--text-muted)">Saldo Inicial</span>
            </div>
            <input type="text" id="f_saldo_ini" oninput="moneyMask(this); updateData()" placeholder="R$ 0,00"
                class="text-xl font-display font-bold bg-transparent border-0 w-full p-0 glow-gold"
                style="color:var(--gold); font-family:'DM Mono',monospace;">
        </div>

        <!-- Total Entradas -->
        <div class="summary-card p-4 rounded-2xl border flex flex-col gap-2" style="background:var(--surface);border-color:var(--border);">
            <div class="flex items-center gap-2">
                <i data-lucide="trending-up" class="w-3.5 h-3.5" style="color:var(--green)"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest" style="color:var(--text-muted)">Entradas</span>
            </div>
            <h2 id="displayReceber" class="text-xl font-mono font-semibold glow-green" style="color:var(--green)">R$ 0,00</h2>
            <div class="h-1 rounded-full" style="background:var(--border)">
                <div id="barEntradas" class="h-1 rounded-full progress-bar" style="background:var(--green);width:0%"></div>
            </div>
        </div>

        <!-- Total Saídas -->
        <div class="summary-card p-4 rounded-2xl border flex flex-col gap-2" style="background:var(--surface);border-color:var(--border);">
            <div class="flex items-center gap-2">
                <i data-lucide="trending-down" class="w-3.5 h-3.5" style="color:var(--red)"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest" style="color:var(--text-muted)">Saídas</span>
            </div>
            <h2 id="displayPagar" class="text-xl font-mono font-semibold glow-red" style="color:var(--red)">R$ 0,00</h2>
            <div class="h-1 rounded-full" style="background:var(--border)">
                <div id="barSaidas" class="h-1 rounded-full progress-bar" style="background:var(--red);width:0%"></div>
            </div>
        </div>

        <!-- Saldo Previsto -->
        <div id="boxSaldo" class="summary-card p-4 rounded-2xl border flex flex-col gap-2 transition-colors duration-500" style="background:var(--surface2);border-color:var(--gold-dim);">
            <div class="flex items-center gap-2">
                <i data-lucide="landmark" class="w-3.5 h-3.5" style="color:var(--gold)"></i>
                <span class="text-[9px] font-bold uppercase tracking-widest" style="color:var(--text-muted)">Saldo Previsto</span>
            </div>
            <h2 id="displaySaldo" class="text-xl font-mono font-bold glow-gold" style="color:var(--gold)">R$ 0,00</h2>
            <div class="text-[10px]" style="color:var(--text-muted)" id="saldoStatus">—</div>
        </div>
    </div>

    <!-- ─── BARRA SALDO REAL ─── -->
    <div class="grid grid-cols-3 gap-0 rounded-2xl overflow-hidden border no-print shrink-0"
        style="background:var(--surface);border-color:var(--border);">
        <div class="flex items-center justify-between px-5 py-3 bar-divider">
            <div>
                <div class="text-[9px] font-bold uppercase tracking-widest mb-0.5" style="color:var(--green)">Recebido</div>
                <span id="realRecebido" class="text-base font-mono font-semibold" style="color:var(--green)">R$ 0,00</span>
            </div>
            <div class="w-2 h-2 rounded-full" style="background:var(--green); box-shadow:0 0 6px var(--green)"></div>
        </div>
        <div class="flex items-center justify-between px-5 py-3 bar-divider">
            <div>
                <div class="text-[9px] font-bold uppercase tracking-widest mb-0.5" style="color:var(--red)">Pago</div>
                <span id="realPago" class="text-base font-mono font-semibold" style="color:var(--red)">R$ 0,00</span>
            </div>
            <div class="w-2 h-2 rounded-full" style="background:var(--red); box-shadow:0 0 6px var(--red)"></div>
        </div>
        <div class="flex items-center justify-between px-5 py-3">
            <div>
                <div class="text-[9px] font-bold uppercase tracking-widest mb-0.5" style="color:var(--gold)">Em Mãos</div>
                <span id="realSaldo" class="text-base font-mono font-bold" style="color:var(--gold)">R$ 0,00</span>
            </div>
            <i data-lucide="hand-coins" class="w-4 h-4" style="color:var(--gold-dim)"></i>
        </div>
    </div>

    <!-- ─── ÁREA PRINCIPAL ─── -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5" style="min-height: 420px;">

        <!-- FORMULÁRIO -->
        <div class="lg:col-span-3 rounded-2xl border p-5 flex flex-col gap-5 no-print"
            style="background:var(--surface);border-color:var(--border);">

            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4" style="color:var(--gold)"></i>
                    <span id="formTitle" class="text-[10px] font-bold uppercase tracking-widest" style="color:var(--text-soft)">Novo Registro</span>
                </div>
                <span id="editBadge" class="hidden editing-badge text-[9px] font-bold px-2 py-0.5 rounded-full uppercase"
                    style="background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--gold-dim)">Editando</span>
            </div>

            <div class="gold-line"></div>

            <!-- Dia + Descrição -->
            <div class="flex gap-3">
                <div class="flex flex-col gap-1.5 w-16">
                    <label class="text-[9px] font-bold uppercase tracking-widest ml-1" style="color:var(--text-muted)">Dia</label>
                    <input type="number" id="f_dia" min="1" max="31" placeholder="01"
                        onkeydown="handleKey(event)"
                        class="w-full p-2.5 rounded-xl font-mono font-bold text-center text-sm border"
                        style="background:var(--surface2);border-color:var(--border);color:var(--text);">
                </div>
                <div class="flex flex-col gap-1.5 flex-1">
                    <label class="text-[9px] font-bold uppercase tracking-widest ml-1" style="color:var(--text-muted)">Descrição</label>
                    <input type="text" id="f_desc" placeholder="Ex: ALUGUEL"
                        onkeydown="handleKey(event)"
                        class="w-full p-2.5 rounded-xl text-sm font-semibold uppercase border"
                        style="background:var(--surface2);border-color:var(--border);color:var(--text);">
                </div>
            </div>

            <!-- Valor -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[9px] font-bold uppercase tracking-widest ml-1" style="color:var(--text-muted)">Valor</label>
                <input type="text" id="f_valor" oninput="moneyMask(this)" placeholder="R$ 0,00"
                    onkeydown="handleKey(event)"
                    class="w-full p-4 rounded-2xl font-mono font-bold text-2xl text-center border"
                    style="background:var(--surface2);border-color:var(--border);color:var(--gold);">
            </div>

            <!-- Botões principais -->
            <div class="flex gap-3">
                <button onclick="addItem('R')" class="btn-add flex-1 py-3.5 rounded-xl font-bold text-sm flex flex-col items-center gap-1 transition-all"
                    style="background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.2);"
                    onmouseover="this.style.background='rgba(52,211,153,0.2)'"
                    onmouseout="this.style.background='rgba(52,211,153,0.12)'">
                    <i data-lucide="arrow-up-circle" class="w-5 h-5"></i>
                    <span class="text-[9px] uppercase tracking-widest">Receber</span>
                </button>
                <button onclick="addItem('P')" class="btn-add flex-1 py-3.5 rounded-xl font-bold text-sm flex flex-col items-center gap-1 transition-all"
                    style="background:rgba(248,113,113,0.12);color:var(--red);border:1px solid rgba(248,113,113,0.2);"
                    onmouseover="this.style.background='rgba(248,113,113,0.2)'"
                    onmouseout="this.style.background='rgba(248,113,113,0.12)'">
                    <i data-lucide="arrow-down-circle" class="w-5 h-5"></i>
                    <span class="text-[9px] uppercase tracking-widest">Pagar</span>
                </button>
            </div>

            <div class="text-[9px] text-center" style="color:var(--text-muted)">
                <kbd class="px-1.5 py-0.5 rounded border text-[9px]" style="border-color:var(--border)">Enter</kbd> para adicionar rapidamente
            </div>

            <!-- Botões de ação -->
            <div class="mt-auto pt-4 gold-line"></div>
            <div class="flex gap-2">
                <button onclick="cancelEdit()" id="btnCancelar" class="hidden flex-1 py-2.5 rounded-xl text-[10px] font-bold uppercase border transition-all"
                    style="border-color:var(--gold-dim);color:var(--gold);"
                    onmouseover="this.style.background='rgba(201,168,76,0.1)'"
                    onmouseout="this.style.background='transparent'">
                    Cancelar
                </button>
                <button onclick="window.print()" class="flex-1 py-2.5 rounded-xl text-[10px] font-bold uppercase border transition-all flex items-center justify-center gap-1.5"
                    style="border-color:var(--border);color:var(--text-muted);"
                    onmouseover="this.style.background='rgba(255,255,255,0.05)'"
                    onmouseout="this.style.background='transparent'"
                    data-tip="Imprimir relatório">
                    <i data-lucide="printer" class="w-3.5 h-3.5"></i> Relatório
                </button>
                <button onclick="limparTudo()" class="flex-1 py-2.5 rounded-xl text-[10px] font-bold uppercase border transition-all flex items-center justify-center gap-1.5"
                    style="border-color:var(--border);color:var(--red);"
                    onmouseover="this.style.background='rgba(248,113,113,0.08)'"
                    onmouseout="this.style.background='transparent'"
                    data-tip="Apagar todos os dados">
                    <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Reset
                </button>
            </div>
        </div>

        <!-- LISTAS -->
        <div class="lg:col-span-9 grid grid-cols-1 md:grid-cols-2 gap-5 min-h-0">

            <!-- Entradas -->
            <div class="flex flex-col gap-3 min-h-0">
                <div class="flex items-center justify-between px-1">
                    <span class="text-[9px] font-bold uppercase tracking-widest" style="color:var(--green)">▲ Entradas</span>
                    <span id="countR" class="text-[9px] font-bold px-2 py-0.5 rounded-full" style="background:rgba(52,211,153,0.1);color:var(--green)">0</span>
                </div>

                <!-- Pendentes -->
                <div class="flex flex-col gap-2 flex-1 min-h-0" style="max-height: 45vh;">
                    <div class="text-[9px] font-semibold uppercase tracking-wider px-1" style="color:var(--text-muted)">Pendentes</div>
                    <div id="listR_pendente" class="flex-1 rounded-xl border overflow-y-auto p-2 space-y-1.5 custom-scroll"
                        style="background:var(--surface);border-color:var(--border);min-height:80px;"></div>
                </div>

                <!-- Confirmadas -->
                <div class="flex flex-col gap-2 flex-1 min-h-0" style="max-height: 30vh;">
                    <div class="text-[9px] font-semibold uppercase tracking-wider px-1" style="color:var(--text-muted)">Confirmadas</div>
                    <div id="listR_confirmado" class="flex-1 rounded-xl border-2 border-dashed overflow-y-auto p-2 space-y-1.5 custom-scroll"
                        style="border-color:var(--border);min-height:70px;"></div>
                </div>
            </div>

            <!-- Saídas -->
            <div class="flex flex-col gap-3 min-h-0">
                <div class="flex items-center justify-between px-1">
                    <span class="text-[9px] font-bold uppercase tracking-widest" style="color:var(--red)">▼ Saídas</span>
                    <span id="countP" class="text-[9px] font-bold px-2 py-0.5 rounded-full" style="background:rgba(248,113,113,0.1);color:var(--red)">0</span>
                </div>

                <!-- Pendentes -->
                <div class="flex flex-col gap-2 flex-1 min-h-0" style="max-height: 45vh;">
                    <div class="text-[9px] font-semibold uppercase tracking-wider px-1" style="color:var(--text-muted)">Pendentes</div>
                    <div id="listP_pendente" class="flex-1 rounded-xl border overflow-y-auto p-2 space-y-1.5 custom-scroll"
                        style="background:var(--surface);border-color:var(--border);min-height:80px;"></div>
                </div>

                <!-- Confirmadas -->
                <div class="flex flex-col gap-2 flex-1 min-h-0" style="max-height: 30vh;">
                    <div class="text-[9px] font-semibold uppercase tracking-wider px-1" style="color:var(--text-muted)">Confirmadas</div>
                    <div id="listP_confirmado" class="flex-1 rounded-xl border-2 border-dashed overflow-y-auto p-2 space-y-1.5 custom-scroll"
                        style="border-color:var(--border);min-height:70px;"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ─── SCRIPT ─── -->
<script>
    // ── Estado Global ──
    const STORAGE_KEY = 'fin_pro_v12';
    let ds = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { P: [], R: [], saldoIni: 0, mes: null, ano: null };
    let editId = null;

    // ── Inicialização ──
    lucide.createIcons();
    initMesAno();
    renderAll();

    function initMesAno() {
        const now = new Date();
        const anos = document.getElementById('f_ano');
        for (let y = now.getFullYear() + 1; y >= 2020; y--) {
            const o = document.createElement('option');
            o.value = y; o.textContent = y;
            anos.appendChild(o);
        }

        const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        const mesAtual = meses[now.getMonth()];
        document.getElementById('f_mes').value = ds.mes || mesAtual;
        document.getElementById('f_ano').value = ds.ano || now.getFullYear();
    }

    // ── Máscara Monetária ──
    function moneyMask(i) {
        let v = i.value.replace(/\D/g, '');
        v = (v / 100).toFixed(2) + '';
        v = v.replace('.', ',');
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, '$1.$2.$3,');
        v = v.replace(/(\d)(\d{3}),/g, '$1.$2,');
        i.value = 'R$ ' + v;
    }

    function parseMoney(val) {
        if (!val) return 0;
        return parseFloat(String(val).replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
    }

    // ── Salvar mês/ano no estado ──
    function updateData() {
        ds.saldoIni = parseMoney(document.getElementById('f_saldo_ini').value);
        ds.mes = document.getElementById('f_mes').value;
        ds.ano = document.getElementById('f_ano').value;
        saveAndRef();
    }

    // ── Tecla Enter para adicionar ──
    function handleKey(e) {
        if (e.key !== 'Enter') return;
        const v = parseMoney(document.getElementById('f_valor').value);
        const d = document.getElementById('f_desc').value;
        if (v && d) addItem(editId ? getEditType() : 'P');
    }

    function getEditType() {
        if (ds.R.find(i => i.id === editId)) return 'R';
        return 'P';
    }

    // ── Adicionar / Editar ──
    function addItem(type) {
        const d = document.getElementById('f_dia').value || new Date().getDate();
        const s = document.getElementById('f_desc').value.trim();
        const v = parseMoney(document.getElementById('f_valor').value);
        if (!s || v === 0) { shakeInput(); return; }

        if (editId) {
            // preservar o estado 'ok' ao editar
            const oldOk = (ds.R.find(i => i.id === editId) || ds.P.find(i => i.id === editId))?.ok || false;
            ds.R = ds.R.filter(i => i.id !== editId);
            ds.P = ds.P.filter(i => i.id !== editId);
            ds[type].push({ id: editId, dia: parseInt(d), desc: s.toUpperCase(), valor: v, ok: oldOk });
            editId = null;
            hideEditUI();
        } else {
            ds[type].push({ id: Date.now(), dia: parseInt(d), desc: s.toUpperCase(), valor: v, ok: false });
        }

        ds[type].sort((a, b) => a.dia - b.dia);
        saveAndRef();
        clearForm();
    }

    function shakeInput() {
        const inp = document.getElementById('f_valor');
        inp.style.animation = 'none';
        setTimeout(() => {
            inp.style.animation = '';
            inp.style.borderColor = 'var(--red)';
            setTimeout(() => inp.style.borderColor = '', 1000);
        }, 10);
    }

    function clearForm() {
        ['f_desc', 'f_valor', 'f_dia'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f_desc').focus();
    }

    // ── Toggle OK ──
    function toggleItem(type, id) {
        const item = ds[type].find(i => i.id === id);
        if (item) { item.ok = !item.ok; saveAndRef(); }
    }

    // ── Editar ──
    function prepareEdit(type, id) {
        const item = ds[type].find(i => i.id === id);
        if (!item) return;
        editId = id;
        document.getElementById('f_dia').value = item.dia;
        document.getElementById('f_desc').value = item.desc;
        document.getElementById('f_valor').value = 'R$ ' + item.valor.toLocaleString('pt-br', { minimumFractionDigits: 2 });
        document.getElementById('formTitle').innerText = 'Editando...';
        document.getElementById('editBadge').classList.remove('hidden');
        document.getElementById('btnCancelar').classList.remove('hidden');
        document.getElementById('btnCancelar').classList.add('flex');
        document.getElementById('f_desc').focus();
    }

    function cancelEdit() {
        editId = null;
        clearForm();
        hideEditUI();
    }

    function hideEditUI() {
        document.getElementById('formTitle').innerText = 'Novo Registro';
        document.getElementById('editBadge').classList.add('hidden');
        document.getElementById('btnCancelar').classList.add('hidden');
        document.getElementById('btnCancelar').classList.remove('flex');
    }

    // ── Deletar ──
    function delItem(type, id) {
        if (confirm('Excluir este lançamento?')) {
            ds[type] = ds[type].filter(i => i.id !== id);
            saveAndRef();
        }
    }

    // ── Limpar tudo ──
    function limparTudo() {
        if (confirm('Apagar TODOS os dados desta competência?')) {
            ds = { P: [], R: [], saldoIni: 0, mes: ds.mes, ano: ds.ano };
            document.getElementById('f_saldo_ini').value = '';
            saveAndRef();
        }
    }

    // ── Salvar e Renderizar ──
    function saveAndRef() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(ds));
        renderAll();
    }

    // ── Renderizar ──
    function renderAll() {
        const lists = {
            R_pendente: document.getElementById('listR_pendente'),
            R_confirmado: document.getElementById('listR_confirmado'),
            P_pendente: document.getElementById('listP_pendente'),
            P_confirmado: document.getElementById('listP_confirmado'),
        };
        Object.values(lists).forEach(l => l.innerHTML = '');

        let tR = 0, tP = 0, realR = 0, realP = 0;

        const draw = (item, type) => {
            const isR = type === 'R';
            const color = isR ? 'var(--green)' : 'var(--red)';
            const sign = isR ? '+' : '−';
            const borderStyle = item.ok
                ? `border-left: 3px solid ${color}; background: rgba(${isR ? '52,211,153' : '248,113,113'},0.04);`
                : `border-left: 3px solid var(--border);`;

            const html = `
            <div class="item-card flex items-center gap-2.5 px-3 py-2.5 rounded-xl border cursor-pointer group"
                style="background:var(--surface2);border-color:var(--border);${borderStyle}">
                <input type="checkbox" ${item.ok ? 'checked' : ''} onchange="toggleItem('${type}', ${item.id})"
                    title="${item.ok ? 'Desmarcar' : 'Confirmar'}">
                <span class="text-[10px] font-mono font-bold px-1.5 py-0.5 rounded-md shrink-0"
                    style="background:var(--surface);color:var(--text-muted);border:1px solid var(--border)">
                    ${String(item.dia).padStart(2, '0')}
                </span>
                <span onclick="prepareEdit('${type}', ${item.id})"
                    class="text-xs font-semibold uppercase truncate flex-1 hover:opacity-70 transition-opacity"
                    style="color:${item.ok ? 'var(--text-muted)' : 'var(--text)'};${item.ok ? 'text-decoration:line-through' : ''}"
                    title="Clique para editar">${item.desc}</span>
                <span class="text-sm font-mono font-bold shrink-0" style="color:${color}">${sign}R$ ${item.valor.toLocaleString('pt-br', { minimumFractionDigits: 2 })}</span>
                <button onclick="delItem('${type}', ${item.id})" class="opacity-0 group-hover:opacity-100 transition-opacity no-print shrink-0" title="Excluir">
                    <i data-lucide="x" class="w-3.5 h-3.5" style="color:var(--text-muted)"></i>
                </button>
            </div>`;

            if (isR) {
                tR += item.valor;
                if (item.ok) { realR += item.valor; lists.R_confirmado.innerHTML += html; }
                else { lists.R_pendente.innerHTML += html; }
            } else {
                tP += item.valor;
                if (item.ok) { realP += item.valor; lists.P_confirmado.innerHTML += html; }
                else { lists.P_pendente.innerHTML += html; }
            }
        };

        ds.R.forEach(i => draw(i, 'R'));
        ds.P.forEach(i => draw(i, 'P'));

        // Empty states
        const empty = (label) => `
            <div class="empty-state">
                <i data-lucide="inbox" style="width:20px;height:20px;color:var(--border)"></i>
                <span style="font-size:10px;color:var(--text-muted)">${label}</span>
            </div>`;

        if (!lists.R_pendente.innerHTML) lists.R_pendente.innerHTML = empty('Nenhuma entrada pendente');
        if (!lists.R_confirmado.innerHTML) lists.R_confirmado.innerHTML = empty('Nenhuma confirmada');
        if (!lists.P_pendente.innerHTML) lists.P_pendente.innerHTML = empty('Nenhuma saída pendente');
        if (!lists.P_confirmado.innerHTML) lists.P_confirmado.innerHTML = empty('Nenhuma confirmada');

        // Contadores
        document.getElementById('countR').innerText = ds.R.length;
        document.getElementById('countP').innerText = ds.P.length;

        // Dashboard principal
        document.getElementById('displayReceber').innerText = 'R$ ' + tR.toLocaleString('pt-br', { minimumFractionDigits: 2 });
        document.getElementById('displayPagar').innerText   = 'R$ ' + tP.toLocaleString('pt-br', { minimumFractionDigits: 2 });

        const saldoFinal = ds.saldoIni + tR - tP;
        document.getElementById('displaySaldo').innerText = 'R$ ' + saldoFinal.toLocaleString('pt-br', { minimumFractionDigits: 2 });

        // Status do saldo
        const statusEl = document.getElementById('saldoStatus');
        if (saldoFinal > 0) { statusEl.innerText = '✦ Positivo'; statusEl.style.color = 'var(--green)'; }
        else if (saldoFinal < 0) { statusEl.innerText = '⚠ Negativo'; statusEl.style.color = 'var(--red)'; }
        else { statusEl.innerText = '—'; statusEl.style.color = 'var(--text-muted)'; }

        const boxEl = document.getElementById('boxSaldo');
        if (saldoFinal < 0) {
            boxEl.style.borderColor = 'rgba(248,113,113,0.5)';
            document.getElementById('displaySaldo').style.color = 'var(--red)';
        } else {
            boxEl.style.borderColor = 'var(--gold-dim)';
            document.getElementById('displaySaldo').style.color = 'var(--gold)';
        }

        // Progress bars
        const total = tR + tP;
        document.getElementById('barEntradas').style.width = total > 0 ? (tR / total * 100) + '%' : '0%';
        document.getElementById('barSaidas').style.width   = total > 0 ? (tP / total * 100) + '%' : '0%';

        // Saldo real
        document.getElementById('realRecebido').innerText = 'R$ ' + realR.toLocaleString('pt-br', { minimumFractionDigits: 2 });
        document.getElementById('realPago').innerText = 'R$ ' + realP.toLocaleString('pt-br', { minimumFractionDigits: 2 });
        const saldoReal = ds.saldoIni + realR - realP;
        document.getElementById('realSaldo').innerText = 'R$ ' + saldoReal.toLocaleString('pt-br', { minimumFractionDigits: 2 });

        // Saldo inicial
        if (ds.saldoIni > 0 && document.activeElement.id !== 'f_saldo_ini') {
            document.getElementById('f_saldo_ini').value = 'R$ ' + ds.saldoIni.toLocaleString('pt-br', { minimumFractionDigits: 2 });
        }

        lucide.createIcons();
    }
</script>
</body>
</html>
