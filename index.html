<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Financeiro Elite v30.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --accent: #ff7a00;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 122, 0, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.02) 0px, transparent 50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Glassmorphism */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.02), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            border-radius: 24px;
        }

        /* Inputs Estilizados */
        .input-premium {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .input-premium:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 122, 0, 0.05);
            transform: translateY(-1px);
        }

        /* Cards de Lançamento */
        .entry-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            background: #ffffff;
        }
        .entry-card:hover {
            transform: scale(1.01) translateY(-2px);
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.05);
            border-color: #f1f5f9;
        }

        .btn-action {
            transition: all 0.2s;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 11px;
        }
        .btn-action:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        /* Badges */
        .badge-status {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .hide-actions .action-btns { opacity: 0; }
        .entry-card:hover .action-btns { opacity: 1; }

        .ultra-focus-mode .sidebar, .ultra-focus-mode .header-extra { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

<div class="max-w-[1400px] mx-auto">
    
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
        <div>
            <div class="flex items-center gap-3 mb-1">
                <div class="w-10 h-10 bg-[#ff7a00] rounded-xl flex items-center justify-center shadow-lg shadow-orange-200">
                    <i data-lucide="layers" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tighter">FINANCEIRO<span class="text-[#ff7a00]">ELITE</span></h1>
            </div>
            <p class="text-slate-400 text-xs font-medium ml-1">Gestão de Fluxo de Caixa v30.0</p>
        </div>

        <div class="flex items-center gap-4 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
            <select id="f_mes" class="bg-transparent font-bold text-sm px-4 outline-none"></select>
            <select id="f_ano" class="bg-slate-900 text-white font-bold text-sm px-6 py-2.5 rounded-xl outline-none"></select>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="glass-panel p-6 border-l-4 border-l-[#ff7a00]">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Saldo Previsto</span>
            <div id="totalSaldo" class="text-3xl font-black mt-1 tracking-tight">R$ 0,00</div>
            <div class="mt-4 flex gap-2">
                 <span id="saldoCaixa" class="badge-status bg-emerald-50 text-emerald-600">Dinheiro: R$ 0</span>
                 <span id="saldoBanco" class="badge-status bg-blue-50 text-blue-600">Inter: R$ 0</span>
            </div>
        </div>
        <div class="glass-panel p-6">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Receitas</span>
            <div id="totalR" class="text-3xl font-black mt-1 text-emerald-500 tracking-tight">R$ 0,00</div>
            <div class="w-full bg-slate-100 h-1.5 rounded-full mt-4 overflow-hidden">
                <div class="bg-emerald-500 h-full" style="width: 70%"></div>
            </div>
        </div>
        <div class="glass-panel p-6">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Despesas</span>
            <div id="totalP" class="text-3xl font-black mt-1 text-rose-500 tracking-tight">R$ 0,00</div>
            <div class="w-full bg-slate-100 h-1.5 rounded-full mt-4 overflow-hidden">
                <div class="bg-rose-500 h-full" style="width: 40%"></div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 sidebar">
            <div class="glass-panel p-8 sticky top-8">
                <h2 class="text-sm font-black uppercase mb-6 flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4 text-orange-500"></i> Novo Registro
                </h2>
                
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Dia</label>
                            <input type="number" id="f_dia" class="input-premium" placeholder="01">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Parcelas</label>
                            <input type="number" id="f_parc" value="1" class="input-premium">
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Descrição</label>
                        <input type="text" id="f_desc" class="input-premium uppercase" placeholder="Ex: Venda SaaS">
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Conta</label>
                        <select id="f_conta" class="input-premium">
                            <option value="banco">🏦 BANCO INTER</option>
                            <option value="caixa">💵 DINHEIRO EM MÃO</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Valor</label>
                        <input type="text" id="f_valor" class="input-premium text-2xl font-bold text-slate-900" placeholder="R$ 0,00">
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-4">
                        <button id="btnAddR" class="btn-action bg-emerald-500 text-white p-4 shadow-lg shadow-emerald-100">Entrada</button>
                        <button id="btnAddP" class="btn-action bg-rose-500 text-white p-4 shadow-lg shadow-rose-100">Saída</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-10">
            
            <section>
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xs font-black uppercase tracking-[2px] text-slate-400 flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-emerald-500"></div> Próximos Recebimentos
                    </h3>
                </div>
                <div id="listR_pend" class="space-y-3"></div>
                
                <div class="mt-6">
                    <button id="btnToggleRConf" class="text-[10px] font-bold text-slate-400 hover:text-slate-600 flex items-center gap-2 uppercase">
                        <i data-lucide="check-check" class="w-4 h-4"></i> Ver Recebidos (<span id="countR_conf">0</span>)
                    </button>
                    <div id="wrapR_conf" class="hidden mt-4 space-y-2">
                        <div id="listR_conf"></div>
                    </div>
                </div>
            </section>

            <section>
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xs font-black uppercase tracking-[2px] text-slate-400 flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-rose-500"></div> Contas a Pagar
                    </h3>
                </div>
                <div id="listP_pend" class="space-y-3"></div>

                <div class="mt-6">
                    <button id="btnTogglePConf" class="text-[10px] font-bold text-slate-400 hover:text-slate-600 flex items-center gap-2 uppercase">
                        <i data-lucide="check-check" class="w-4 h-4"></i> Ver Pagos (<span id="countP_conf">0</span>)
                    </button>
                    <div id="wrapP_conf" class="hidden mt-4 space-y-2">
                        <div id="listP_conf"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>

<div id="editModal" class="hidden fixed inset-0 z-50 bg-slate-900/20 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="glass-panel w-full max-w-md p-8 bg-white">
        <h3 class="text-lg font-black mb-6">Editar Lançamento</h3>
        <div class="space-y-4">
            <input type="number" id="edit_dia" class="input-premium w-full" placeholder="Dia">
            <input type="text" id="edit_desc" class="input-premium w-full uppercase" placeholder="Descrição">
            <input type="text" id="edit_valor" class="input-premium w-full text-xl font-bold">
            <select id="edit_conta" class="input-premium w-full">
                <option value="banco">INTER</option>
                <option value="caixa">DINHEIRO</option>
            </select>
            <div class="flex items-center gap-2 p-2">
                <input type="checkbox" id="edit_ok" class="w-5 h-5 accent-orange-500">
                <label class="text-xs font-bold text-slate-500 uppercase">Confirmar Pagamento</label>
            </div>
            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="closeEditModal()" class="btn-action bg-slate-100 text-slate-600 p-3">Cancelar</button>
                <button onclick="saveEdit()" class="btn-action bg-slate-900 text-white p-3">Salvar</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCi8znMRngui3EI6tODeuczGcUV2o3U90c",
        authDomain: "financeiro-guilherme-49a5b.firebaseapp.com",
        projectId: "financeiro-guilherme-49a5b",
        storageBucket: "financeiro-guilherme-49a5b.firebasestorage.app",
        messagingSenderId: "61246912262",
        appId: "1:61246912262:web:75273e5394d837e6e69087"
    };

    const app = initializeApp(firebaseConfig);
    const db_fire = getFirestore(app);
    let db = {};
    let editingItem = null;

    const formatBRL = (v) => Number(v || 0).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    const parseBRL = (t) => parseFloat(String(t || '').replace(/[R$\s.]/g, '').replace(',', '.')) || 0;

    function applyMoneyMask(input) {
        let v = input.value.replace(/\D/g, '');
        v = (v / 100).toFixed(2).replace('.', ',');
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, '$1.$2.$3,');
        v = v.replace(/(\d)(\d{3}),/g, '$1.$2,');
        input.value = v === '0,00' ? '' : 'R$ ' + v;
    }

    function getMonthKey() {
        return `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
    }

    async function init() {
        setupSelectors();
        await loadData();
        bindEvents();
        render();
        lucide.createIcons();
    }

    function setupSelectors() {
        const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        const mSel = document.getElementById('f_mes');
        const aSel = document.getElementById('f_ano');
        const now = new Date();
        meses.forEach((m, i) => mSel.innerHTML += `<option value="${i}">${m.toUpperCase()}</option>`);
        for (let y = now.getFullYear() + 2; y >= 2023; y--) aSel.innerHTML += `<option value="${y}">${y}</option>`;
        mSel.value = now.getMonth();
        aSel.value = now.getFullYear();
        mSel.onchange = render;
        aSel.onchange = render;
    }

    async function loadData() {
        const snap = await getDocs(collection(db_fire, "financeiro"));
        snap.forEach(d => db[d.id] = d.data());
    }

    async function sync(id) {
        await setDoc(doc(db_fire, "financeiro", id), db[id]);
    }

    function render() {
        const id = getMonthKey();
        if (!db[id]) db[id] = { R: [], P: [], saldoIniCaixa: 0, saldoIniBanco: 0 };
        const data = db[id];

        const lists = { 
            Rp: document.getElementById('listR_pend'), Rc: document.getElementById('listR_conf'),
            Pp: document.getElementById('listP_pend'), Pc: document.getElementById('listP_conf')
        };
        Object.values(lists).forEach(l => l.innerHTML = '');

        let tR = 0, tP = 0, sCaixa = Number(data.saldoIniCaixa || 0), sBanco = Number(data.saldoIniBanco || 0);

        const createRow = (item, type) => `
            <div class="entry-card flex items-center justify-between p-4 rounded-2xl ${item.ok ? 'opacity-50' : ''}">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-100 flex items-center justify-center text-xs font-black text-slate-400">
                        ${String(item.dia).padStart(2,'0')}
                    </div>
                    <div>
                        <div class="text-[13px] font-bold uppercase tracking-tight">${item.desc}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[9px] font-black ${item.conta === 'caixa' ? 'text-emerald-500' : 'text-blue-500'} uppercase">
                                ${item.conta === 'caixa' ? 'Dinheiro' : 'Inter'}
                            </span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <div class="font-bold text-sm ${type === 'R' ? 'text-emerald-600' : 'text-rose-600'}">${formatBRL(item.valor)}</div>
                    <div class="action-btns flex gap-1">
                        <input type="checkbox" ${item.ok ? 'checked' : ''} onchange="window.toggleItem('${type}', ${item.id})" class="w-5 h-5 accent-orange-500 cursor-pointer mr-2">
                        <button onclick="window.editItem('${type}', ${item.id})" class="p-2 text-slate-300 hover:text-orange-500 transition-colors"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                        <button onclick="window.delItem('${type}', ${item.id})" class="p-2 text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        `;

        data.R.sort((a,b) => a.dia - b.dia).forEach(item => {
            tR += Number(item.valor);
            if (item.ok) {
                if (item.conta === 'caixa') sCaixa += Number(item.valor); else sBanco += Number(item.valor);
                lists.Rc.innerHTML += createRow(item, 'R');
            } else {
                lists.Rp.innerHTML += createRow(item, 'R');
            }
        });

        data.P.sort((a,b) => a.dia - b.dia).forEach(item => {
            tP += Number(item.valor);
            if (item.ok) {
                if (item.conta === 'caixa') sCaixa -= Number(item.valor); else sBanco -= Number(item.valor);
                lists.Pc.innerHTML += createRow(item, 'P');
            } else {
                lists.Pp.innerHTML += createRow(item, 'P');
            }
        });

        document.getElementById('totalR').innerText = formatBRL(tR);
        document.getElementById('totalP').innerText = formatBRL(tP);
        document.getElementById('totalSaldo').innerText = formatBRL(sCaixa + sBanco);
        document.getElementById('saldoCaixa').innerText = `Dinheiro: ${formatBRL(sCaixa)}`;
        document.getElementById('saldoBanco').innerText = `Inter: ${formatBRL(sBanco)}`;
        document.getElementById('countR_conf').innerText = data.R.filter(x=>x.ok).length;
        document.getElementById('countP_conf').innerText = data.P.filter(x=>x.ok).length;

        lucide.createIcons();
    }

    function bindEvents() {
        document.getElementById('f_valor').oninput = (e) => applyMoneyMask(e.target);
        document.getElementById('btnAddR').onclick = () => addItem('R');
        document.getElementById('btnAddP').onclick = () => addItem('P');
        document.getElementById('btnToggleRConf').onclick = () => document.getElementById('wrapR_conf').classList.toggle('hidden');
        document.getElementById('btnTogglePConf').onclick = () => document.getElementById('wrapP_conf').classList.toggle('hidden');
    }

    async function addItem(type) {
        const desc = document.getElementById('f_desc').value.trim().toUpperCase();
        const valor = parseBRL(document.getElementById('f_valor').value);
        const dia = parseInt(document.getElementById('f_dia').value) || new Date().getDate();
        const parc = parseInt(document.getElementById('f_parc').value) || 1;
        const conta = document.getElementById('f_conta').value;

        if (!desc || valor <= 0) return alert("Preencha descrição e valor.");

        let m = parseInt(document.getElementById('f_mes').value);
        let a = parseInt(document.getElementById('f_ano').value);

        for (let i = 0; i < parc; i++) {
            const key = `${m}_${a}`;
            if (!db[key]) db[key] = { R: [], P: [], saldoIniCaixa: 0, saldoIniBanco: 0 };
            db[key][type].push({ id: Date.now() + Math.random(), dia, desc: parc > 1 ? `${desc} (${i+1}/${parc})` : desc, valor, ok: false, conta });
            await sync(key);
            if (++m > 11) { m = 0; a++; }
        }
        render();
    }

    window.toggleItem = async (type, id) => {
        const key = getMonthKey();
        const item = db[key][type].find(x => x.id === id);
        if (item) item.ok = !item.ok;
        await sync(key); render();
    };

    window.editItem = (type, id) => {
        const key = getMonthKey();
        const item = db[key][type].find(x => x.id === id);
        editingItem = { type, id, key };
        document.getElementById('edit_dia').value = item.dia;
        document.getElementById('edit_desc').value = item.desc;
        document.getElementById('edit_valor').value = formatBRL(item.valor);
        document.getElementById('edit_ok').checked = item.ok;
        document.getElementById('editModal').classList.remove('hidden');
    };

    window.closeEditModal = () => document.getElementById('editModal').classList.add('hidden');

    window.saveEdit = async () => {
        const item = db[editingItem.key][editingItem.type].find(x => x.id === editingItem.id);
        item.dia = parseInt(document.getElementById('edit_dia').value);
        item.desc = document.getElementById('edit_desc').value.toUpperCase();
        item.valor = parseBRL(document.getElementById('edit_valor').value);
        item.ok = document.getElementById('edit_ok').checked;
        await sync(editingItem.key);
        render(); closeEditModal();
    };

    window.delItem = async (type, id) => {
        if (!confirm("Excluir?")) return;
        const key = getMonthKey();
        db[key][type] = db[key][type].filter(x => x.id !== id);
        await sync(key); render();
    };

    init();
</script>
</body>
</html>
