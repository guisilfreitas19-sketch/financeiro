<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Financeiro App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .item-ok { opacity: 0.3; text-decoration: line-through; }
        button { cursor: pointer !important; touch-action: manipulation; }
    </style>
</head>
<body class="p-4 bg-slate-100 font-sans">

    <div class="max-w-5xl mx-auto space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded shadow border-l-4 border-green-500">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Receber</p>
                <h2 id="displayReceber" class="text-xl font-black text-green-600">R$ 0,00</h2>
            </div>
            <div class="bg-white p-4 rounded shadow border-l-4 border-red-500">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Pagar</p>
                <h2 id="displayPagar" class="text-xl font-black text-red-600">R$ 0,00</h2>
            </div>
            <div id="boxSaldo" class="bg-blue-600 p-4 rounded shadow text-white">
                <p class="text-[10px] font-bold uppercase opacity-70">Saldo Final</p>
                <h2 id="displaySaldo" class="text-xl font-black">R$ 0,00</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
            <div class="md:col-span-4 bg-white p-6 rounded shadow space-y-4">
                <div class="flex gap-2">
                    <input type="number" id="f_dia" placeholder="Dia" class="w-16 border p-2 rounded font-bold">
                    <input type="text" id="f_desc" placeholder="DESCRIÇÃO" class="flex-1 border p-2 rounded uppercase text-sm font-bold">
                </div>
                <input type="text" id="f_valor" oninput="moneyMask(this)" placeholder="R$ 0,00" class="w-full border p-2 rounded font-mono font-bold text-lg text-blue-700">
                
                <div class="flex gap-2">
                    <button onclick="addItem('R')" class="flex-1 bg-green-500 text-white font-bold py-3 rounded hover:bg-green-600 shadow">ENTRADA</button>
                    <button onclick="addItem('P')" class="flex-1 bg-red-500 text-white font-bold py-3 rounded hover:bg-red-600 shadow">SAÍDA</button>
                </div>
                <button onclick="window.print()" class="w-full border border-gray-300 py-2 rounded text-xs font-bold uppercase">Imprimir Relatório</button>
            </div>

            <div class="md:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white rounded shadow min-h-[200px]">
                    <div class="bg-green-50 p-2 text-green-700 font-bold text-[10px] uppercase text-center">Entradas</div>
                    <div id="listR" class="p-2 space-y-1"></div>
                </div>
                <div class="bg-white rounded shadow min-h-[200px]">
                    <div class="bg-red-50 p-2 text-red-700 font-bold text-[10px] uppercase text-center">Contas a Pagar</div>
                    <div id="listP" class="p-2 space-y-1"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataStore = JSON.parse(localStorage.getItem('fin_v6')) || { P: [], R: [] };

        function moneyMask(i) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
            v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
            i.value = 'R$ ' + v;
        }

        function addItem(type) {
            const d = document.getElementById('f_dia').value || "0";
            const s = document.getElementById('f_desc').value;
            const vRaw = document.getElementById('f_valor').value.replace(/[R$\s.]/g, '').replace(',', '.');
            const v = parseFloat(vRaw);

            if(!s || isNaN(v)) return alert("Preencha descrição e valor!");

            dataStore[type].push({ id: Date.now(), dia: parseInt(d), desc: s.toUpperCase(), valor: v, ok: false });
            dataStore[type].sort((a,b) => a.dia - b.dia);
            
            saveAndRef();
            document.getElementById('f_desc').value = '';
            document.getElementById('f_valor').value = '';
            document.getElementById('f_dia').value = '';
        }

        function delItem(type, id) {
            dataStore[type] = dataStore[type].filter(i => i.id !== id);
            saveAndRef();
        }

        function toggleItem(type, id) {
            const item = dataStore[type].find(i => i.id === id);
            item.ok = !item.ok;
            saveAndRef();
        }

        function saveAndRef() {
            localStorage.setItem('fin_v6', JSON.stringify(dataStore));
            renderAll();
        }

        function renderAll() {
            const rList = document.getElementById('listR');
            const pList = document.getElementById('listP');
            rList.innerHTML = pList.innerHTML = '';
            let tR = 0, tP = 0;

            const draw = (i, type) => `
                <div class="flex justify-between items-center p-2 bg-slate-50 border rounded ${i.ok ? 'item-ok' : ''}">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" ${i.ok ? 'checked' : ''} onchange="toggleItem('${type}', ${i.id})">
                        <span class="text-[9px] font-mono text-gray-400">${String(i.dia).padStart(2,'0')}</span>
                        <span class="text-[10px] font-bold text-gray-600">${i.desc}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[11px] font-bold ${type==='R'?'text-green-600':'text-red-600'}">R$ ${i.valor.toLocaleString('pt-br', {minimumFractionDigits:2})}</span>
                        <button onclick="delItem('${type}', ${i.id})" class="text-gray-300 hover:text-red-400">✕</button>
                    </div>
                </div>`;

            dataStore.R.forEach(i => { tR += i.valor; rList.innerHTML += draw(i, 'R'); });
            dataStore.P.forEach(i => { tP += i.valor; pList.innerHTML += draw(i, 'P'); });

            document.getElementById('displayReceber').innerText = 'R$ ' + tR.toLocaleString('pt-br', {minimumFractionDigits:2});
            document.getElementById('displayPagar').innerText = 'R$ ' + tP.toLocaleString('pt-br', {minimumFractionDigits:2});
            
            const saldo = tR - tP;
            document.getElementById('displaySaldo').innerText = 'R$ ' + saldo.toLocaleString('pt-br', {minimumFractionDigits:2});
            document.getElementById('boxSaldo').className = (saldo >= 0 ? 'bg-blue-600' : 'bg-red-500') + ' p-4 rounded shadow text-white';
        }
        renderAll();
    </script>
</body>
</html>
