<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Financeiro v3.3 - Correção de Saldo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; }
        .sidebar-dark { background: #0f172a; color: white; border-radius: 24px; }
        .input-premium { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; padding: 10px; font-weight: 600; font-size: 13px; }
        .input-init { background: rgba(255, 255, 255, 0.03); border: none; color: #94a3b8; font-size: 11px; font-weight: 700; width: 80px; text-align: right; outline: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .card-item { background: white; border: 1px solid #e2e8f0; border-radius: 14px; margin-bottom: 8px; transition: all 0.2s; }
        .badge-day { background: #f1f5f9; color: #0f172a; font-family: 'JetBrains Mono', monospace; padding: 2px 8px; border-radius: 6px; font-weight: 800; min-width: 35px; text-align: center; }
        .done { opacity: 0.5; filter: grayscale(0.8); }
        .saldo-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 12px; }
        .filter-btn { padding: 6px 16px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: 1px solid #e2e8f0; background: white; color: #64748b; }
        .filter-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
        @media (min-width: 1024px) { .main-container { height: 100vh; overflow: hidden; } .scroll-column { height: calc(100vh - 240px); overflow-y: auto; padding-right: 8px; } }
    </style>
</head>
<body class="p-4 lg:p-6">

<div class="max-w-[1600px] mx-auto main-container">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
        
        <aside class="lg:col-span-3 flex flex-col h-full">
            <div class="sidebar-dark p-6 flex-1 flex flex-col shadow-2xl">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="wallet" class="text-white w-5 h-5"></i></div>
                        <h1 class="text-lg font-black italic">FINANCEIRO <span class="text-blue-500 text-xs">v3.3</span></h1>
                    </div>
                    <button onclick="window.showTransfer()" class="bg-slate-800 p-2 rounded-lg text-blue-400"><i data-lucide="arrow-left-right" class="w-4 h-4"></i></button>
                </div>

                <div class="space-y-3 mb-6">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="f_dia" class="input-premium text-center" placeholder="Dia">
                        <input type="number" id="f_parc" value="1" class="input-premium text-center">
                    </div>
                    <input type="text" id="f_desc" class="input-premium w-full uppercase" placeholder="DESCRIÇÃO">
                    <select id="f_conta" class="input-premium w-full text-xs">
                        <option value="banco">🏦 BANCO INTER</option>
                        <option value="caixa">💵 EM MÃO (CAIXA)</option>
                    </select>
                    <input type="text" id="f_valor" class="input-premium w-full text-xl font-black text-blue-400 text-center" placeholder="R$ 0,00">
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btnAddR" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl uppercase text-xs">Entrada</button>
                        <button id="btnAddP" class="bg-slate-700 hover:bg-slate-600 text-white font-black py-3 rounded-xl uppercase text-xs">Saída</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="saldo-card border-l-4 border-l-blue-500">
                        <div class="flex justify-between items-start mb-1">
                            <p class="text-[9px] font-bold text-slate-400 uppercase italic">Banco Inter</p>
                            <div class="flex items-center gap-2">
                                <button onclick="window.showReajuste('banco')" class="text-slate-500 hover:text-white"><i data-lucide="wrench" class="w-3 h-3"></i></button>
                                <input type="text" id="init_banco" class="input-init" placeholder="Início R$ 0" onblur="window.updateInit()">
                            </div>
                        </div>
                        <h4 id="labelBanco" class="text-lg font-black text-white">R$ 0,00</h4>
                    </div>
                    <div class="saldo-card border-l-4 border-l-emerald-500">
                        <div class="flex justify-between items-start mb-1">
                            <p class="text-[9px] font-bold text-slate-400 uppercase italic">Dinheiro Vivo</p>
                            <div class="flex items-center gap-2">
                                <button onclick="window.showReajuste('caixa')" class="text-slate-500 hover:text-white"><i data-lucide="wrench" class="w-3 h-3"></i></button>
                                <input type="text" id="init_caixa" class="input-init" placeholder="Início R$ 0" onblur="window.updateInit()">
                            </div>
                        </div>
                        <h4 id="labelCaixa" class="text-lg font-black text-white">R$ 0,00</h4>
                    </div>
                </div>

                <div class="mt-auto pt-6 border-t border-slate-800">
                    <div class="flex items-center gap-2 mb-2">
                        <select id="f_mes" class="bg-transparent text-[10px] font-bold uppercase outline-none text-slate-500"></select>
                        <select id="f_ano" class="bg-transparent text-[10px] font-bold outline-none text-slate-500"></select>
                    </div>
                    <p class="text-[10px] font-black text-slate-500 uppercase">Projetado Final</p>
                    <h2 id="totalSaldo" class="text-2xl font-black text-white">R$ 0,00</h2>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-9 flex flex-col h-full">
            <div class="flex items-center gap-2 mb-6 bg-white p-2 rounded-2xl border border-slate-200 self-start shadow-sm">
                <button onclick="window.setFilter('all')" id="btn-f-all" class="filter-btn active">Tudo</button>
                <button onclick="window.setFilter('banco')" id="btn-f-banco" class="filter-btn">🏦 Inter</button>
                <button onclick="window.setFilter('caixa')" id="btn-f-caixa" class="filter-btn">💵 Caixa</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 h-full">
                <div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 mb-4 flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Receitas</span>
                        <h3 id="totalR" class="text-xl font-black text-emerald-600">R$ 0,00</h3>
                    </div>
                    <div class="scroll-column"><div id="listR_pend"></div><div id="listR_conf"></div></div>
                </div>
                <div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 mb-4 flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-400 uppercase">Despesas</span>
                        <h3 id="totalP" class="text-xl font-black text-rose-600">R$ 0,00</h3>
                    </div>
                    <div class="scroll-column"><div id="listP_pend"></div><div id="listP_conf"></div></div>
                </div>
            </div>
        </main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCi8znMRngui3EI6tODeuczGcUV2o3U90c",
        authDomain: "financeiro-guilherme-49a5b.firebaseapp.com",
        projectId: "financeiro-guilherme-49a5b",
        storageBucket: "financeiro-guilherme-49a5b.firebasestorage.app",
        messagingSenderId: "61246912262",
        appId: "1:61246912262:web:75273e5394d837e6e69087"
    };

    const app = initializeApp(firebaseConfig);
    const db_fire = getFirestore(app);
    let db = {}, currentFilter = 'all';

    const formatBRL = (v) => Number(v || 0).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
    const parseBRL = (t) => parseFloat(String(t || '').replace(/[R$\s.]/g, '').replace(',', '.')) || 0;

    function mask(i) {
        let v = i.value.replace(/\D/g, '');
        v = (v/100).toFixed(2).replace('.', ',');
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, '$1.$2.$3,').replace(/(\d)(\d{3}),/g, '$1.$2,');
        i.value = v === '0,00' ? '' : 'R$ ' + v;
    }

    async function init() {
        const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const mS = document.getElementById('f_mes'), aS = document.getElementById('f_ano'), n = new Date();
        meses.forEach((m, i) => mS.innerHTML += `<option value="${i}">${m}</option>`);
        for (let y = n.getFullYear() + 1; y >= 2024; y--) aS.innerHTML += `<option value="${y}">${y}</option>`;
        mS.value = n.getMonth(); aS.value = n.getFullYear();
        mS.onchange = render; aS.onchange = render;
        
        document.querySelectorAll('input').forEach(i => { if(i.id.includes('valor') || i.id.includes('init')) i.oninput = () => mask(i); });
        document.getElementById('btnAddR').onclick = () => add('R');
        document.getElementById('btnAddP').onclick = () => add('P');
        
        const s = await getDocs(collection(db_fire, "financeiro"));
        s.forEach(d => db[d.id] = d.data());
        render();
    }

    window.showReajuste = async (conta) => {
        const extrato = prompt(`Qual o valor REAL que está na conta ${conta === 'banco' ? 'Inter' : 'Caixa'} agora?`);
        if(!extrato) return;
        
        const valorRealDigitado = parseBRL(extrato);
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const data = db[key];
        
        // Calculando o saldo atual do sistema (Início + Confirmados)
        let saldoAtualSistema = (conta === 'banco' ? data.initBanco : data.initCaixa) || 0;
        data.R.forEach(it => { if(it.ok && it.conta === conta) saldoAtualSistema += it.valor; });
        data.P.forEach(it => { if(it.ok && it.conta === conta) saldoAtualSistema -= it.valor; });

        const diferenca = valorRealDigitado - saldoAtualSistema;
        
        if (Math.abs(diferenca) < 0.01) return alert("O saldo já está batendo!");

        // Se a diferença for positiva (tenho mais no banco do que no app), vira RECEITA
        // Se a diferença for negativa (tenho menos no banco do que no app), vira DESPESA
        const tipo = diferenca > 0 ? 'R' : 'P';
        
        data[tipo].push({
            id: Date.now(),
            dia: new Date().getDate(),
            desc: "AJUSTE DE SALDO",
            valor: Math.abs(diferenca),
            ok: true,
            conta: conta
        });

        await setDoc(doc(db_fire, "financeiro", key), data);
        render();
    };

    window.updateInit = async () => {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if(!db[key]) db[key] = { R:[], P:[], initBanco:0, initCaixa:0 };
        db[key].initBanco = parseBRL(document.getElementById('init_banco').value);
        db[key].initCaixa = parseBRL(document.getElementById('init_caixa').value);
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
        render();
    };

    function render() {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if (!db[key]) db[key] = { R: [], P: [], initBanco:0, initCaixa:0 };
        const data = db[key];
        
        document.getElementById('init_banco').value = data.initBanco > 0 ? formatBRL(data.initBanco) : '';
        document.getElementById('init_caixa').value = data.initCaixa > 0 ? formatBRL(data.initCaixa) : '';

        ['listR_pend', 'listR_conf', 'listP_pend', 'listP_conf'].forEach(id => document.getElementById(id).innerHTML = '');
        let tr=0, tp=0, sc_real=data.initCaixa || 0, sb_real=data.initBanco || 0;

        const row = (it, type) => `
            <div class="card-item flex items-center justify-between p-3 ${it.ok ? 'done' : ''}">
                <div class="flex items-center gap-3">
                    <span class="badge-day">${String(it.dia).padStart(2,'0')}</span>
                    <div>
                        <p class="text-[11px] font-bold text-slate-700 uppercase leading-none">${it.desc}</p>
                        <p class="text-[9px] font-black text-slate-400 uppercase mt-1">${it.conta === 'banco' ? 'Inter' : 'Caixa'}</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xs font-black ${type==='R'?'text-emerald-600':'text-rose-600'}">${formatBRL(it.valor)}</span>
                    <div class="flex gap-1">
                        <input type="checkbox" ${it.ok?'checked':''} onchange="window.tk('${type}', ${it.id})" class="w-4 h-4 accent-blue-600">
                        <button onclick="window.del('${type}', ${it.id})" class="p-1 text-slate-200 hover:text-rose-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                    </div>
                </div>
            </div>`;

        data.R.sort((a,b)=>a.dia-b.dia).forEach(it => {
            tr += it.valor; 
            if(it.ok) (it.conta==='caixa' ? sc_real += it.valor : sb_real += it.valor);
            if(currentFilter === 'all' || it.conta === currentFilter) document.getElementById(it.ok?'listR_conf':'listR_pend').innerHTML += row(it, 'R');
        });
        data.P.sort((a,b)=>a.dia-b.dia).forEach(it => {
            tp += it.valor; 
            if(it.ok) (it.conta==='caixa' ? sc_real -= it.valor : sb_real -= it.valor);
            if(currentFilter === 'all' || it.conta === currentFilter) document.getElementById(it.ok?'listP_conf':'listP_pend').innerHTML += row(it, 'P');
        });

        document.getElementById('totalR').innerText = formatBRL(tr);
        document.getElementById('totalP').innerText = formatBRL(tp);
        document.getElementById('labelBanco').innerText = formatBRL(sb_real);
        document.getElementById('labelCaixa').innerText = formatBRL(sc_real);
        document.getElementById('totalSaldo').innerText = formatBRL((data.initBanco + data.initCaixa + tr) - tp);
        lucide.createIcons();
    }

    window.setFilter = (f) => {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-f-${f}`).classList.add('active');
        render();
    };

    async function add(type) {
        const d = document.getElementById('f_desc').value.toUpperCase(), v = parseBRL(document.getElementById('f_valor').value), dia = parseInt(document.getElementById('f_dia').value) || 1, key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        if(!d || v <= 0) return;
        if (!db[key]) db[key] = { R: [], P: [], initBanco:0, initCaixa:0 };
        db[key][type].push({ id: Date.now(), dia, desc: d, valor: v, ok: false, conta: document.getElementById('f_conta').value });
        await setDoc(doc(db_fire, "financeiro", key), db[key]);
        document.getElementById('f_desc').value = ''; document.getElementById('f_valor').value = ''; render();
    }

    window.showTransfer = async () => {
        const v = prompt("Valor da Transferência:");
        if(!v) return;
        const val = parseBRL(v), dir = confirm("OK: INTER -> CAIXA\nCANCEL: CAIXA -> INTER");
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`, dia = new Date().getDate();
        db[key].P.push({ id: Date.now(), dia, desc: "TRANSFERÊNCIA", valor: val, ok: true, conta: dir ? 'banco' : 'caixa' });
        db[key].R.push({ id: Date.now()+1, dia, desc: "TRANSFERÊNCIA", valor: val, ok: true, conta: dir ? 'caixa' : 'banco' });
        await setDoc(doc(db_fire, "financeiro", key), db[key]); render();
    };

    window.tk = async (type, id) => {
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        const it = db[key][type].find(x=>x.id===id); it.ok = !it.ok;
        await setDoc(doc(db_fire, "financeiro", key), db[key]); render();
    };

    window.del = async (type, id) => {
        if(!confirm("Excluir?")) return;
        const key = `${document.getElementById('f_mes').value}_${document.getElementById('f_ano').value}`;
        db[key][type] = db[key][type].filter(x=>x.id!==id);
        await setDoc(doc(db_fire, "financeiro", key), db[key]); render();
    };

    init();
</script>
</body>
</html>
